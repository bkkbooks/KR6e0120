body:
  text: 蒼山再光寺比丘普瑞集疏言如夢者下十忍品疏云開此夢義亦有五法一所依悟心以喻本識二所因謂睡蓋以喻無明習氣三所見謂夢相差別以喻緣所起法四此夢事非有而有但心變故非現前法故非有五令夢者取以為實有鈔解云一所依者若無本識無所熏故則無無明等亦可喻如來藏喻本識者諸宗共許故法相宗明如來藏不受熏故二所因者智論云復次如夢中無喜事而妄喜無瞋而瞋無怖而怖三界衆生亦復如是無明力故不應瞋而瞋等四此夢事者智論云夢有五種一若身中不調若熱氣多則夢見火見黃赤二若冷氣多見水見白三若風氣多則見飛見黑四又復所聞見事多思惟念故五或天與夢欲令知未來事故是五種夢皆無實事而妄見世人亦復如是五道之中衆生身力因緣故見四種我衆色是我所我中有色色中有我如色受想行識亦復如是四五二十得實智覺已知無實評曰上五法通明夢喻今取喻體者正約第三所現夢相差別不離片時爾鈔夢遊天宮喻者即是第九本會中二乘不見不聞故有此喻釋曰下出此中引義也昔人云者即岑參春夢詩也上二句云洞房昨夜春風起遙憶美人湘江水鈔普賢行品等者鈔云初偈達衆生及器此二世間假名無實即假觀次偈雙離分別及無分別即空觀次偈解念無念即中道觀又云初偈觀次偈止後偈雙運止觀次偈不動遊剎於器界自在故如是自在下結上自在皆由知如夢故亦通喻為無為大品云設有一法過涅槃者我亦説言如夢如夢既爾下如影等準此知之以此文亦可證知如影故問夢境可爾夢心豈無答亦從緣故何有真實鈔引證便合者後二句合前二句故也言但言下即攝論中引經頌耳案西域下鈔轉引夢事以證也彼云婆羅痆斯國境有涸池周八十餘步一名救命又謂烈士聞諸梵志曰數百年前有隱士於此池側結廬屏迹等云云同鈔言築壇場者彼續云周一丈餘命一烈士信勇昭著執長刀等言達明登仙者續云所執之刀變為寶劒指麾所欲皆從無衰無變不病不死是人既得仙方等言後得烈士下具云後於城中偶見一人悲號逐路隱士覩其相心甚慶悅即而慰問何至怨傷曰我以貧窶傭力自濟其主見知特深信用期滿五歲當酬重償於是忍勤苦忘艱辛五歲將終一旦違失既蒙笞辱又無所得以此為怨悲悼誰恤隱士命等同此言憤恚而死下續云免火災難故云救命感息而死又曰烈士疏六如影像下決擇記云影字疑錯應是鏡字尋鈔自知以疏中二義釋之結云一切法互為鏡像此是喻體喻一切法皆如鏡如像如鏡時為能現以一真心全體成一切法故皆如鏡含明了性而為能現如像時為所現謂彼復心心所法所變境故為所現也既釋之與結皆約鏡像何得標名乃云影像耶故知錯爾或可不錯標義狹釋義寬鈔自揀故鈔然約鏡像等者隨前錯不錯二釋亦別若約錯字釋者此標揀非今所用言無鏡之能者鏡像既別於一一法上唯有所現像虗之義無能現鏡實之義以能現鏡喻真理故諸法唯有像義言今取下正顯今之所用但一一法皆有鏡像二義故互有能所現也若依不錯字釋者應有問云疏釋中既有鏡像二義何以標名但云影像耶然約下答也意云若約鏡像為喻法喻不齊喻中鏡不是像像不是鏡鏡無虗無之義像無能現之功法中不爾故標名中但取影像為喻以況性空虗無之義也問何以釋中却具鏡像二義耶今取即入下答也既一切法全真心成皆亦為能現有鏡之能現而全為所現故約鏡像二義釋也二釋之中後釋近宗鈔十忍品等者次前經云譬如日月男子女人舍宅山林河泉等物於油於水於身於寶於明鏡等清白物中而現其影然諸衆生下與鈔同彼疏云由以有無為有無不知即影了不可取故成執著於中先取有無為著後遠物下舉正義顯上為執不知此影無遠近故如執鏡臨池池中月出而此影不近天上之月去地四萬二千由旬影落潭中而亦不遠以不可取故無遠近上皆是喻謂菩薩下法合以自他無別之身合前現影於自國土合前近物於他國土合前遠物謂能現國土雖自他遠近之異菩薩所現之身豈有自他遠近之別也上隨喻合以國為能現身為所現若唯約法説以國為所現身為能現耳故彼鈔云以喻菩薩遠在他方恆住此故雖在此處常在彼故安有遠近之異相耶一切遠近皆類此知今取經中明鏡現日月男女等以證前鏡像之義取影不隨物而有遠近證前如鏡互照不壞本相也鈔偈中云下以水喻於世間以影喻菩薩之身影於水中非內非外菩薩於世不住不出由入此甚深之境能於無邊之世普化羣生釋曰下不但菩薩如影亦了世間皆如影也疏常修緣起下約其能等緣起觀無性觀大願回向即此三行能於外及餘無量殊勝因故若約所等緣起無性等者一近等上四二等二觀之餘齊佛所知一切因門也大願回向等者亦等取法界諸因也問與前等何以異耶答前等約因無限量此等約一一稱同法界故二別也鈔如一慈門下妙嚴品云清淨慈門剎塵數共生如來一妙相一一諸相莫不然是故見者無厭足鈔兼起下即緣起相由觀法無定性觀言是法所攝者即十對體事皆用此觀門而貫通之既於諸法中不生礙解則一切法皆得自在言如於昔因下果似於因故佛名為果究竟為果菩薩名果對前修因今得為果亦可徹果得名為果疏由冥真性得如性用者由佛無分別智冥契真性體用證法在己法爾能令諸法混融無礙故疏無比功德等者具云以一國土滿十方十方入一亦無餘世界本相亦不壞無比功德故能爾前鈔云即約德相之文此晉經也然據旨歸此證在因無限中彼解云無比德者出所因也意以無限善根為無比功德以此為因即因由之因也若今疏第七即昔勝因此亦探玄自改以分因果之殊今疏所用爾鈔無比功德即佛德也者揀別旨歸之意也以證法在己超過人天為無比功德也鈔普賢行品云下舉劣況勝也世界名號尚不可盡況勝智佛法耶此勝智佛法即佛無比功德言前即德相下問前料揀云八唯德相今何通業用耶答有二意一云前但約一相耳非盡理也盡理亦具相用二云雖有業用約佛用亦稱德相德上用故疏而彼微塵亦不增等者此句與下相連不與上連謂與鈔中相連云於一普現難思剎等疏十神通解脫者謂佛靈妙不測之神於境無擁之通名為神通解脫者是作用解脫非離障解脫也言十通者如造疏十意中已列由通力故令無障礙不思議法下義引略證解脫疏引智論云菩薩有不思議解脫離障解脫諸佛有無礙解脫作用解脫所作無障脫拘礙故疏由上十因下令十對所依體事之法具上十玄之義明知十因皆建立無礙義之因非辨法之因也鈔該取前三等者意明雖此疏文正結第四周遍含容以上十因正是周遍含容之因故但正結第四一門而意亦兼取前所依體事攝歸真實彰其無礙皆別教一乘義理分齊以前標四門釋亦四門今亦結四門則標釋結皆相應故疏教所被機者志延鈔云謂諸衆生性欲差別有如草木種類不同則名根也若衆生扣發如來應會其猶杼軸關牽交織故名機也又楞嚴搜微鈔云機是弩牙機動則箭無不發機感則應無不往故謂機也疏若明能應等者是約能被身教之法揀定所被之機也疏前五揀非器等者約其兼正前五俱是所揀約其引權遠為前五皆為所被疏一無信非器等者此五即前劣後勝貞元疏云約非正為皆成所揀疏二違真非器等者以行違真道故探玄記云不求出離莊飾我人故離世間品云於甚深法深生慳吝有堪化者而不為説若得財利恭敬供養雖非法器而強為説是為魔業且儒教宗意在道德仁義禮樂智信不在於馳騁名利所令揚名後代者以道德孝義為名尚不以官祿才藝為名況釋教宗意在通達自心精修定慧具大悲智不在立身業而却依傍此經以求名利非魔業而何也大乘方等總持經説我滅度後四衆弟子實非菩薩自謂菩薩是外道人曾於過去供養諸佛發願力故於佛法律而得出家隨所至處多求親友名聞利養恣行穢污成就惡行自不禁制自不調伏於一切法門及出生堅固三昧皆悉遠離實無所知為親屬故妄稱知解住於諂曲口説異言身行異行無墮此類之中思之自省慎之勿為言下經下即離世間品疏云由妄行本令所修善感生死果不至菩提故是魔業鈔三乖實非器下既如文取義乖背實理也探玄記云雖不巧為然隨自執見以取經文則超情理不入於心止觀云如人久住城門弘決志云正法所都為城通法之教曰門分別瓦木評薄精粗謂南是北非東巧西拙自作稽留不肯前進非門過也著者亦爾分別名相廣知煩惱多誦道品邀名聚衆媒衒求達打自大鼓豎我慢幢誇耀於他互生鬪諍八十八使真愛浩然皆由著心於正法門而生邪見所起煩惱與外道無異方等云種種問橋智者所呵方等陀羅尼經云我於往昔作一比丘時有居士設大施會請諸沙門婆羅門貧窮下賤須衣與衣須食與食須珍寶與珍寶我時極大貧窮而無所有我時望得財賄往詣會所於其中路見一大橋於其橋上見衆多人匆匆往來時諸人中有一智者我以愚意問此人言此橋何人所作此河從何而來今向何流問此木何林所生何人所斫何象所載青乎白乎黑乎何日所斫此木松也柏也柳也曲也直也有節無節破此木鐵何冶所出何匠所作此河鹹也苦也深也淺也何用作此橋也我於爾時作七千八百問已爾時智者便答我言咄癡沙門居士請汝汝但涉路至於會所可得悅意後不生悔汝今設問如是等事於身何利何用問為汝今速去還已語汝我時聞此語涉路而去便到會所所食蕩盡財寶無餘我時見已慎惱結恨還到橋上時人問言汝何憔悴我時答言以貧窮故往諸會所欲求衣食所須之置於其中間以見於汝徒問無益之言使我不值飲食所須財物以是因緣我心生惱爾時智者而便答言夫為比丘於身無利而不應問何用問為乃至廣説故云種種問橋也言故下文云下即出現品次文云唯除菩薩疏云明受非受有圓信手能受衆行故為之權小於斯不盡能受是故不為集法經云是經雖行閻浮提於能信深法者常住如是衆生心手常於諸佛所護衆生中行於直心不諂曲衆生中行等又探玄云若不發菩提心終日執卷未曾入手起惑造業為名利講讀遍數雖多未曾入手良以此經非是衆生流傳之緣故不入手鈔論云等者下疏云一不正信以隨言解不稱實故二退勇猛不能忘相趣實理故此二違行三誑他以己謬解為人説故喪他慧目自説魔法故四者謗佛指己謬解是佛説故此二違人五者輕法以淺近解解甚深故謂法如言不殷重故此一違法應知豈但熟習文義便名解了耶疏四狹劣非器等者由無大悲不能下化故狹中無大智不能上求故劣或可反此亦得五守權非器者謂守執權教行於權行希於權果者非此經之器也問若約五教當何教菩薩耶答會解云據下鈔唯圓教因果但有實事前四因中則有至果皆無由修權因若入地後即歸實故即總揀由聞三教也言隨宗者即瑜伽瓔珞等宗中也探玄云謂三乘共教菩薩隨自宗中修行未滿初僧祇亦非此器以第二僧祇入地即入實也故唯約三賢非器下文云菩薩摩訶薩雖無量億那由他劫行六度乃至猶為假名菩薩問瓔珞經等十千劫修十信行滿何故此中無量億等不信此經答以彼但於行布位中修行信等於此圓融普賢十信一攝一切猶未聞信由此故知二宗差別若不爾者修行既經爾許劫不信此經何名菩薩摩訶薩也疏後五顯所為中等者此五即先勝後劣為次唯為大乘不思議乘菩薩者下疏云所謂圓根不揀凡聖今云大乘者揀於小乘不思議者揀於權乘謂一運一切運下釋上不思議乘也探玄記云乘者運轉為義若依別門初運至十信次運至十住乃至佛果次第相成以階彼岸名思議若依普門一位即一切位故亦運一切運名不思議乘乘此乘者十信滿心即得六位如普賢品等説又十住等位皆亦如是如下文諸會處説又善財一生具五位等皆是普法相收故也又舍那品云非餘境界之所知普賢行人方得入又普賢誡衆生云普眼境界清淨身我今演説仁諦聽如是可知問何故此法非餘境界答盧舍那周遍塵方普應法界一切羣機稱自根器但各見己所見聞自所聞皆不見他所見不聞他所聞此普賢機乃見一切所見聞一切所聞此盡舍那能化分齊故云普眼境界是故當知普別二機感普別二法各不同也疏二兼為等者探玄記云謂遺法中見聞信向此無盡法成金剛種等鈔約未悟入者決擇云謂地獄天子聞天鼓説法頓超十地乃是正為今約前身熏種之時故屬兼為問彼時聞經不信謗經即墮地獄應屬遠為何名為兼為兼之根已向信故答地獄天子而有二義一或由謗經屬遠為攝二或由戒緩當兼為攝故無失也大海劫火等者正是難不障聞故為兼為疏三引為等者自下還收前所揀者貞元疏云慈雲廣布若天無私不揀榮枯遐霏法雨言借其三乘行布之名者以十地寄三乘名顯一乘圓融義也然約無其所局義言借耳令不依名義取著故若約全收三乘行布名義亦非圓教之外以是一乘所現故彼謂同於我先所習之法故後因熏習方始信入圓融之法貞元疏云其猶藥置乳中乳能愈病如小兒愛乳而不愛藥故將藥置乳中乳能愈病以圓投相相自亡權探玄記云如前權教菩薩於彼教中多時長養深解窮徹行布教源即當此普法界既云無量億那由他劫不信此經即知過此劫數必當信受以離此普法更無餘路得成佛故經不可説過此劫數猶不信故問若彼地前過彼劫數必信受者即知地上二宗不別豈彼所信無十地耶答於教中具有行布十地漸次乃至佛果長養彼根器務令成熟極遲之者至此劫定當信入如其疾者即是不定鈔因果俱有實事等者因非曲徑果不虗指故前四依教修行皆為入圓方便故因中則有至自乘果但有教説無實證故此約證道真實非約教道權施然此中暗用天台意也故下鈔云智者雖説四教三教果處無有實事但就教中施設有果進位後果即便虗無如別教説三賢十地修三賢則有可修及證十地更無有別此約證道別教十地證位即是圓教家住耳此據教道廢別就圓即由此義圓教初住自在過地猶如下約喻前四入圓終歸處故唯此則終頓之機亦引為中攝以依此法出彼教而引攝故疏四權為等者約能為標所為也以實是菩薩權示聲聞以化實聲聞也故貞元疏云或示在座如聾如盲彰其絶分驚餘欣樂六千啓發悟心捨劣向勝令實者知可回心入大於己亦有分也此段本非化大菩薩權作聲聞者但化實狹劣之聲聞故是知五百六千於十類衆中即顯法衆是起教緣中收故前疏云除當根衆於皆是緣其所化實者於十類衆中即當機衆教起因中收仍通現未故前疏云諸會當機即是現在今之聞者是未來機然此科是清涼新加探玄本為轉為則華嚴正不為聲聞但約展轉為之今聲聞於三乘中轉為菩薩方入華嚴一乘無從小乘直入一乘者故彼文云四轉為者謂諸二乘以根鈍故要先回入共教大乘捨二乘名得菩薩稱然後方入此普賢法故説此經唯為菩薩不攝二乘若不爾者餘大乘經有聲聞衆為所被機亦引二乘令其入大唯獨此經衆無聲聞之機文無回小之説何成了義深廣之典設第八會有聲聞者為寄對表法如聾如盲非是所被其六千比丘非是羅漢故不相違是故當知一切二乘總無頓入普賢法界依究竟説無有二乘而不回入共教菩薩無彼菩薩而不入此普賢之法是故展轉無不皆是此法之器評曰據此二類聲聞五百非所被之機六千雖是所被然非羅漢之器顯是回在共教中來也故教章云六千比丘非是前所列衆此等皆是已在三乘中令回向一乘故作此説今清涼不取此説故改為權為謂合取二類聲聞俱作能為也以此二類皆權聲聞而正為實聲聞也故疏云二乘既其不聞何況受持此實聲聞也故諸菩薩權示聲聞此權聲聞五百六千為能為也彰其絶分抑也知可回心揚也然但約五百不見聞者乃彰法深勝亦是抑令聲聞修見聞種今合二類同為一道化事顯同別分齊彰聾盲顯別教在道悟顯同教互相抑揚令其見聞後必趣入也然則賢首不許聲聞直入一乘故名轉為清涼許聲聞直入一乘故名權為故前隨機不定門許小乘直入一乘也問華嚴當會有實聲聞否答但有能為之權聲聞其實聲聞不在當會若是漸機次第至法華會入今約不定之機或於佛世或在未來知今二類聲聞其不見聞者由闕緣種得悟入者昔由圓因故於聲聞之身以下圓頓之種故也以華嚴無實聲聞二祖意同但展轉入與直入別爾展轉入者正在聲聞時不許見聞轉為菩薩時方許見聞下種後入一乘也二祖之意亦抑揚異也疏故出現品云下下疏云藥王生長喻喻佛窮劫利樂智先揀非器無為正位一墮難出故喻深坑又無悲水取灰斷故如彼地獄邪見撥無因果貪愛浸瀾皆喻於水不容善根又闕土緣非生處故由前經云如藥王樹能令一切樹生長唯於二處不能為作生長利益所謂地獄深坑及水輪中後收言無厭捨者上據現惡闕緣令生厭怖直進一乘故除二處而同有佛性久久當成故不厭捨是知現惡明無則無惡必有故涅槃云一闡提雖復斷善猶有佛性若能發心非闡提也法華云決了聲聞法餘諸聲聞衆亦當復如是有引向所揀證無佛性及定性義不觀次後不捨之言況第十喻平等共有若言三分半衆生無佛性者損減佛性恐毀謗一乘願諸後學當誠慎之無滯權説決釋問云後之所為即前所揀五類非器收揀相違其猶水火如何通會答下疏云其猶黎庶以對於王貴賤懸隔以王收人則率土之內莫非王人是以若約普收則一切衆生無不具有如來智慧況於二乘無漏因果若校優劣則權教久行菩薩尚不信聞況於二乘二乘上首尚如聾盲況凡夫外道耶鈔二即彼品見聞利益中文者勘經是出現意業中文若第十見聞利益是亦藥王遍益喻作六根境界如前見聞益以釋恐傳寫之誤耳鈔然初一正是邪見下牒難也然邪見有二下釋成而有二義一者輕重雖異俱是邪見故二者二三本非邪見今欲以經總收攝合入邪見之數也鈔亦第十見聞利益者以出現品有十段一總辨多緣以成正覺二正覺身三語業四智五境六行七菩提八轉法輪九入涅槃十見聞利益今即第十段中文也佛子等者疏云明不信益此顯益深證初無信亦遠為故如來祕密藏經云罵藥服之得力罵沉燒之還香罵佛猶勝敬諸外道等具如前釋言地獄天子下以經不出墮地獄之因故今兩楹而言故云或由也或者不定義纂玄記云地獄天子有其二類一信向熏種由戒緩故即時未悟故屬兼為如隨好品説二謗經熏種由不信故非兼為收終醒悟故故屬遠為如出現品説故今前後各一意也言法華等者彼經説昔謗常不輕菩薩所説一乘妙法故無間地獄長受大苦經千劫已方始受不輕教化即跋陀婆羅菩薩等是也故涅槃喻以毒塗之鼓欲聞不聞無不死者故菩薩之名起自聞謗之口謗尚遠益況深信耶況解行耶況證悟耶弘持之者勉思此文鈔經目歷耳者理實六根遇經皆能熏種即五十八經下離世間品具云復有衆生慢心所覆諸佛出世不能親近恭敬供養新善不起舊善消滅不應説而説不應諍而諍未來必墮險難深坑於百千劫尚不值佛何況聞法但以曾發菩提心故終自醒悟疏云明非長沒亦但遠益耳此成前義不別為一經前見聞利益中經及後身業中經為二處經故前鈔云先引二經鈔出現身業下疏云無信眼為盲佛無生潛益身如日無信至惡猶有佛性亦為饒益令離集苦故疏潛流喻者即義引也經正云佛智海水亦復如是流入一切衆生心中若諸衆生觀察境界修習法門則得智慧清淨明了而如來智平等無二釋曰此即以佛智入衆生心中為具有如來智慧若取今所引却是破塵喻中法説之文故經云無一衆生不具如來智慧但以妄想執著而不證得是也故知前但義引耳言若除妄想下經偈云佛智亦如是遍在衆生心妄想之所纏不覺亦不知諸佛大慈悲令其除妄想如是乃出現饒益諸菩薩鈔又如大海等者引二經亦二處經言前已引者大海潛流喻潛入無礙中已釋破塵出經喻教迹中已釋鈔言被非情等者回向品疏鈔説謂精神化為土木金石如劫毗羅仙人化為石晉張華於燕昭王墓上斫華表化為狐此情變非情也梟鏡負塊以成為子土梟附塊為兒破鏡鳥以毒樹果抱為其子子成父母皆遭其食此非情變情也情變非情非情變情思為邪見不異外道衆生新生草木有命故不可也鈔云此為遮妄執一切有情有佛性義若説無情同一有性故則稍近宗亦須得意今顯正義謂性與相非一非異情與非情亦非一非異一以性從緣則情非情異為性亦殊如涅槃揀瓦礫無覺性智論明在非情為法性在有情為佛性二泯緣從性則非覺不覺真性之中無心境故本絶百非言忘四句三二性互融則無非覺悟起信云所謂從本已來色心不二以色即是智性故色體無形説名智身以智性即色性故説名法身遍一切處今取二性相即融通之義説耳此上一性義況心為總相則無所不攝即唯心義又融攝重重即事事無礙義配今鈔文行相可知又融攝下配鈔初義三二性互融下配鈔第二義況心為下配鈔第二義也疏體性難思者貞元疏云本自寂寥何深何淺言亡戲論非一非多今以無言之言彰無體之體鈔前前淺後後深者以前望後別別十門有九箇淺以後望前別別十門有九箇深言雖有下縱奪釋成也問此教甚深理應唯深者為體何説淺耶故縱云雖有淺深並融為教體問何須融淺答無淺何以顯包含非融何以彰玄妙鈔料揀總有四重者指玄記云總別寬狹漸次為理初重是總後三重別於後三重從寬向狹漸次行文為理於第二重內大乘之中分出第三一乘料揀於第三重內一乘之中分出第四同教別教料揀此有深理助正未許此義者未之思也若究此從寬向狹後當詳其取捨鈔一體性料揀等者顯體通性局也以體與性望性相及理事二對有通有局體者性相之通稱又是理事之通稱性者唯局於理言相舉於外下釋成體通性相性唯局性未必在外但彰顯為相易了稱外言性主於內者不必在內真理為性深隱名內若言下釋成體通理事及性局理義言由後五中下釋成後五通性也是則約性下結歸疏意明後五中有理名性亦即理體故名體也言事但可稱體者前五事相但可稱體名寬義狹別屬事故唯字顯不通理性故若從顯説應云性相料揀也然疏云前五唯體者此但是一相之言如下會聲等四法通至圓融顯義體中亦云況華嚴性海雲臺寶網同演妙音等豈非通性今但約總科故云唯體亦如唯心體中約同別四句説聽等義豈未入實而第七會緣入實方云前來六門同入一實此亦約總科意也鈔大小乘料揀可知者大小乘為能料揀十重體為所料揀謂若以乘望體小乘唯得前四大乘通得十體若以體望乘後六局大前四通小疏約後義後二重準知問初三通小可然第四通小復有何文答下疏云若不詮義教文何用小乘亦有此理故亦通小鈔三乘一乘料揀者問若前七通三乘者大乘可爾小乘云何通五六七耶以前大小乘料揀中小乘唯得前四故答此有諸師不同若隨文説第三重內以本收末故五六七之三門却有小乘返顯第三重本末別分後六唯是本大不攝末小若指玄者先難前云若爾不唯二三兩重有相例之難亦應後重亦有小乘以有一乘之本攝三乘之末故後自釋云約教約性故乃不唯第一重內是約大小教説故不許通第三重內是約一乘三乘性説故許通也今問若爾八九十之三門亦有性義何不通於小耶今詳疏意言總意別有其二意一云雖言前七通三乘意亦以前四通小後三唯大以乘望體大乘有七小乘唯四是其本意以前有大小乘料揀故此唯總指也二云雖言三乘意唯取權教大乘與一乘為料揀以彼立三乘故以為名也又此中後三重料揀皆從寬向狹此唯就大乘中分三一故義如前指若此第三重中更有大小者豈非重耶前已揀故此有深理學者細詳言以會緣入實下此有二釋一云準次科云謂七八雖一乘等似鈔家直以第七第八皆一乘但與九十同七八別九十之異如此疏中合云前六通三乘後四唯一乘方與今三處鈔家相應爾則疏文七三兩字誤書耳二云若順今疏不誤作前七通三乘釋者亦有二意一者實有二義實是空義即屬破相始教故疏云前七通三實是理實即屬頓教故此鈔云歸一實理即一乘也此疏鈔二文各據一意也故二者若以鈔文就疏意不相違釋者鈔意謂以乘望體三乘局前七一乘通十體則前七皆有三一義也若四法與顯義體中約行布不壞相皆有三一義故唯心通三一可知但此七中約所會必通三乘顯義所歸一理即是一乘義難見故此獨釋爾上釋皆有深理隨情去取鈔同教別教相對料揀於前一乘中又取終頓為同教一乘圓教為別教一乘以料揀也言七八雖是一乘者縱之同名一乘奪之是同教一乘也此約深義乃一乘同也言前八皆同者約廣義以通該前八也約終頓合為一同教具有前八門義故寂照取前之四教皆名同教以此前八皆同為證者然鈔不言小始只言終頓故又失從寬向狹之理故義難依準思之鈔於後三重料揀下又料揀也謂若小乘無後六門大乘必兼具前四門三乘無後三門一乘兼具前七門同教無後二門別教必兼具前八門問何故不説初重耶答初重是通相之意且如體性名深寬通不取前無後有故以體性之義通於大小三一等之義故故鈔略之鈔謂佛語言者弘決志云直言曰言詮義曰語唱號言詞者即屈曲聲中詮名字之言也言評量論説者對説是非好惡曰評量於義猶豫不決即名論説也言宮商下即五音也謂依五行辨別木聲壅其音角火聲熾其音徵上聲寬其音宮金聲清其音商水聲濁其音羽鈔十四音者興善三藏金剛瑜伽字母云一阿上二阿長三伊上四伊長五塢六污七𠴊𠴊二合八力盧二合引九噎十愛十一污十二奧十三暗十四惡西域字母有三十四字此十四字即翻字之聲勢也有云言十四音者是曇無讖依龜茲國文字若依中國唯十二音除此十八二音今且依古也鈔增與是名等者語但有聲若云名者不唯有聲亦詮表得法故云增勝於語鈔梵行品云等者疏云音聲是語體吐納等四辨語相此五語音風息等五語緣即語路吻者音義云脣兩頭邊也若語業下直釋記云由前語體對緣別施起居者所問尊位動靜之謂也問訊即入問之詞也高者起居平交問訊於總持者則為略説於委細者則為廣説於難曉者則為喻説於易曉者則為直説於諸功德精進柔和等者則為讚説於諸過惡懈怠剛硬等者則為毀説於諸法門次第得入而解脫者則安立説於諸淺近難信難解難通達者則隨俗説於彼一類信根深遠智慧圓通者則顯了説等鈔表亦是業者業寬表狹又業即取語上功能事事表取表顯令他生解之義於義亦異也言然業有表無表別者表謂表示自他知故無表謂不能表示他知唯自知故言二識所取者謂語表耳識與同時意識所取無表唯一意識所取故又三無數劫下謂三無數劫修行求此巧妙語表為生説法故鈔而云佛教者下牒難而釋也有此三難一難云但言教體便了何約人舉云佛教耶答依根本故教是佛聲故云佛教二問今所見聞之教乃在物機何名佛教答依相似故意謂今所見聞似佛昔所説之聲故三問既是佛聲何名為教以教具名句文三故答依隨順故鈔中自釋言佛依如是等者意云佛依名等欲詮顯義方有所説今聲亦同佛隨彼名等故云佛教也鈔中是教體等者以名句文身為教體也如言子是某父之子雖語其父意在子體合意雖言聲教意在名等親能顯義故疏評家意取下齊此合自為一科以前正明名等為體此下對前明取捨不同應分初正辨當門二對前取捨以評家意唯取聲正理論唯取名等而俱舍雙存二説皆得故云對前取捨也鈔如是説者等評家雙牒前二取聲為正佛音所説他耳所聞故由此二義聲為教體言婆沙是羅漢同集等俱舍疏第一云因脅尊者答迦膩色迦王云云如前是故依之修行無不皆成聖果王因問曰諸部立範孰最善乎我欲修行願尊者説尊者答曰諸部懿典莫越有宗王欲修行宜尊此矣王曰向承嘉旨示以有宗此部三藏今應結集須召有德共詳議之於是萬里星馳四方雲集英賢備萃凡聖及衆既多繁亂不可總為遂簡凡僧唯留聖衆聖衆尚繁簡去有學唯留無學無學復多不可總集於無學內定滿六通知圓四辨內間三藏外達五明方堪結集故以簡留所簡聖衆四百九十有九王曰此國暑濕不堪結集應往王舍城中迦葉結集之處不亦宜乎脅尊者曰王舍城中多諸外道酬答無暇何功造論迦濕彌國林木茂泉石清間聖賢所居靈仙遊止復山有四面城唯一門樞堅固矣可結集焉於是國王及諸聖衆自彼而至迦濕彌國到彼國已緣少一人未滿五百欲召世友然世友識雖明敏未成無學衆欲不取世友顧聖衆曰我見羅漢視之如唾久捨不取以何尊此而棄我乎我欲證之須臾便獲遂於僧衆便立誓言我擲縷丸至空縷下至地願我便證阿羅漢果縷未至空諸天接住謂世友曰大士方期佛果次補彌勒三界特尊四生攸賴一何為此小緣而欲捨棄大事於是聖衆聞此空言頂禮世友推為上座於是五百聖衆初集十萬頌釋素怛纜藏次造十萬頌釋毗奈耶藏後造十萬頌釋阿毗達磨藏即大婆沙是也世友商確馬鳴援翰備釋三藏五百羅漢既結集已刻石立誓唯聽自國不許外傳敕夜叉神守護城門不令散出等昔南海濱枯樹中有五百蝙蝠商人至宿時寒燃火延及枯樹商人誦論蝙蝠樂聞至死不去因是為人出家多智即今五百聖者是也言一世友等者俱舍鈔梵云代蘇多羅唐言世友印士天祠之名以菩薩初生父母責之恐為鬼神所嬈故取彼為名冀無惱害言妙音者梵語窶沙唐言能鳴西域敷演令皆號窶沙謂彼尊者久沉生死今得聖智對者沉默故號能鳴或能宣唱故言法救者梵云達磨恆羅唐言法救謂以法救人故言覺天者梵云部陀提婆唐言覺天謂以佛為天立此號也應知此之四師皆非聊爾之人以評量決定為正義故音釋痆女𭶑切瘡病也杼持呂切機持緯也騁丑領切直驅也縷力主切絲縷也纜力暫切維舟也窶其矩切貧無禮也
