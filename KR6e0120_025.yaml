body:
  text: 蒼山再光寺比丘普瑞集疏故少諍論者唯識但有十師之異不同小乘有二十部故云少也鈔以相多性少等者所詮法數不過百法九十四是法相唯六無為是法性亦作法相名數羅列探玄記云法相名數多同小乘故非了義宗意顯相云法相宗鈔心法有八者於小乘一意識外加眼等五識及七八二識以八識各別出體得差別也言心所有五十一者謂恆依心起與心相應繫屬於心故名心所有法如屬我物立我所名通有財依主二釋於中亦有六類不同而不同小乘一遍行有五謂此五遍性地時俱也性即三性地即九地時即同時俱即與八識俱故云遍行也即持業釋一作意警心為性引心為業二觸三受四想五思可知二別境有五謂此五緣境別故欲緣所樂境勝解緣決定境念緣曾習境定緣所觀境慧緣所緣境故云別境亦持業釋也一欲二勝解即境為性引轉為業三念四三摩地此云等持於所觀境令專住不散也五慧三善有十一謂此世他世俱順益故性離𠍴穢勝過惡法故名之為善一信二精進三慚四愧五無貪六無瞋七無癡於前十外加之體異慧故八輕安九不放逸十行捨精進三根令心平等為性對治掉舉靜住為業也十一不害四根本煩惱有六能生隨惑名為根本煩者擾也惱者亂也擾亂有情恆處生死名為煩惱根本即煩惱煩即是惱俱持業釋一貪二瞋三慢四無明五疑六不正見加此一法小乘是慧故不別立今有別用故別立之於中若開五見即成十使惑也五隨煩惱有二十一忿二恨三惱四覆五誑六諂七憍八嫉九害十慳小隨十一無慚十二無愧中隨十三不信十四懈怠十五放逸十六昏沉十七掉舉十八失念十九不正知二十散亂大隨也唯識云是煩惱分位差別等流性故名隨煩惱釋曰謂忿等十及失念不正知放逸等敘染心所是貪等差別分位名隨煩惱無慚無愧掉舉昏沉散亂不信懈怠七法雖別有體是前根本之等流故名隨煩惱也由煩惱為因得有此故論云此二十種類別説有三謂忿等十各別起故名小隨無慚等二遍不善故名中隨不信等八遍染心故名大隨釋曰由忿等十自類相望各別而起非不共他中大惑俱行位局故名之為小無愧慚二自類得俱行通忿等唯偏不善位局後八但得名中不信等八自得俱生但染皆遍得俱生故不名小隨染皆遍故不得名中二義既殊故八名大也六不定有四謂於三性不定故也一睡眠二惡作三尋四伺此上六類名心所有法言色有十一者準百法疏而有四義一識所依色唯屬五根二識所緣色唯屬六境三總相而言質礙名色四又色有二一者有對色即五根五境是二者無對色即法處色是言五根者釋有通別初通名根者增上出生名之為根五識藉彼為增上緣而得生故次別名者一眼者照燭義故二耳者能聞義三鼻者能嗅義四舌者能嘗味能除飢渴義五身者積聚義依止義雖諸根大造並皆積聚而身根與彼多法依止積聚其中獨得身稱是眼即根持業也餘皆如是言六境者色聲香味觸法也眼所取故名之為色乃至第六意所取故名之為法前十可知法處所攝色者雜集第一云法處所攝色者有五種謂極略色極逈色受所引色遍計所起色定自在所生色極略色者謂極微色極逈色者離餘礙觸色受所引色者無表色遍計所起者謂影像色定自在所生者謂解脫靜慮所行境色釋曰小乘十一謂無表色即今五中但是受所引色也大小攝法寬狹可知言不相應行有二十四者此有二釋一言行者即行蘊行蘊有二一相應行即心所法二不相應行即是得等今言不相應行揀異相應行也二云具足應言非色不相應行即揀四聚心王心所色及無為如理應思行即不相應持業釋也或揀四聚亦相違釋一得於一切法成就用故二命根三衆同分同類相似故依諸有情相似分位衆同分人相似故名人同分天相似故名天同分也四異生性五無想定六滅盡定七無想異熟八名身九句身十文身十一生十二老十三住十四無常上十四同前此下加前十五流轉十六定異因果各無雜故十七相應十八勢速行轉疾速十九次第二十時二十一方二十二數二十三和合性二十四不和合性有為諸行聚散緣別故言無為有六者略有四釋一不生不滅揀四相故二無去無來非三世故三無彼無此皆離自他故四無得無失不增減故即顯無為離此四種無造作故名曰無為或揀有為名曰無為無為兩字即無六釋一虗空無為即五蘊身無處所顯真理無其障礙名曰虗空非取事空也二擇滅無為有揀擇之能滅顯惱所知二障也言無為者即二障滅處所煩真理名曰無為三非擇滅無為不生滅本自有故不由擇智滅惑而有也其本滅即無為也四不動無為即第四禪出八災患所顯之理名不動無為言八災者一憂二苦三喜四樂五尋六伺七出息八入息此八動轉有情故自此以下三義加於前也五滅受想無為言受想者即二心所也滅者不生也即無所有處天中粗想受不行名之為滅所煩真理名曰無為六真如無為即真如理也今且略釋離見其如百鈔中廣釋也鈔而皆如次對前等者即後七義但先後如次非排次數同故云如次以合十為九故唯此第一唯心生滅即當前十對中第三唯心真妄別中妄義此第二一性五性當前第一對一乘三乘別中三乘義及第二對一性五性別中五性義所以爾者以第三心為所依欲對前小乘六識為所依故置在初也鈔説有八識為所依等者前六轉識隨六根境種類異故名為眼識乃至意識是眼之識等依主釋也前五與三十四心所相應頌云遍行別境善十一中二大八貪瞋癡第六識總與五十一種心所相應第七末那具足應云訖黎瑟吒耶末那此云染污意與四惑俱名為染污恆審思量名之為意與十八心所相應頌云遍行別境慧四惑八大隨第八阿賴耶識此云藏識識能含藏諸法種故又具能藏所藏執藏三藏義故由斯三義得藏識名唯與遍行五所相應鈔下文廣説者問明品鈔云攝論釋云無始者無初際故界者因義即種子也是誰因種謂一切法此唯雜染非是清淨即有漏三性種子非無漏種彼一切法本等所依者第八識自證分能任持故非因性義所依無覆無記能依三性性各異故其本有無漏種子并習所成能資無漏聞熏習種寄在異熟識中非阿賴耶自性是彼阿賴耶無分別智種子故故第三論云此中聞熏習謂是阿賴耶識自性為非阿賴耶識自性下論答云此聞熏習隨在一種所依轉處寄在異熟識中與彼和合俱轉猶如水乳然非阿賴耶自性是彼賴耶對治無分別智種子性故下二句易知鈔三乘但是化法等者轉通難也恐有難云既乘性相成何不但名三乘則有五性耶故為此通意云一乘三乘是化法中總名今明別義故唯説五性等也鈔故瑜伽下以菩薩性例顯餘三成有種性義也一本性住等者謂法爾時來本有大乘種性住於藏識名本性住二習所成者謂於大乘熏習所成名習所成餘如前釋鈔顯揚論下通證五性永別論具云云何種性差別五種道理答一切界差別可得故無根有情不應理故同類譬喻不應理故異類譬喻不相應故唯現在世非涅槃法不應理故云何一切界差別可得故謂佛所説諸有情界有種種非一有情界有下劣勝妙有情界有聲聞乘等般涅槃種性有情界有不般涅槃種性有情界等餘四所以具如彼説鈔現行第八名異熟識者有三義故一變異而熟要因自體變異之時果方熟故二異類而熟謂因通善惡果唯無記三異時而熟謂前世造業今世果熟故言由過去煩惱等者問明品鈔云謂第六識人執無明迷真實義異熟理故名惑以善不善相應思造罪等三行名業熏阿賴耶能感五趣愛非愛等種種報相名苦即三雜染但云第六者謂五識無執不能發潤故非迷理無推度故不能造業雖造滿業亦不自能但由意引方能作故言酬引業故等者唯識論云異熟增上緣感第八識酬引業力恆相續故彼疏云勝業名引引餘業生故報亦名引引餘果故成滿果事名滿因果皆有滿義引業能招第八識名真異熟恆相續故名真因通善惡果唯無記故名異熟滿業能招前六識中極劣無記名異熟生有間斷故問明品鈔云能招第八引異熟果故名引業能招第六滿異熟果名為滿業然其引業能造之思要是第六意識所起若其滿業能造之思從五識起故此引業亦名總報業如持五戒招得人身滿業亦名別業又引業如畫師作摸滿業如弟子填彩所以不言第七識業惑生者以第七識非異熟故不從業招而今皆云業惑生者以七八互依有第八時必有第七故或從多分故鈔故唯識論第八云下一段鈔文科分為二初引論釋文二初引論故唯二解釋三初總科分此中二別解釋三初一偈遍計二初總科分初中二別解釋三初能遍計其能二所遍計其所三所執性二初安慧若安二護法若護次一句依他二初正釋上句二句後對顯下句二初唯染分頌言後兼染淨或諸後二句圓成二初釋圓成實三字三初正釋二初總標釋二句二重配釋釋曰二揀別二初徵若爾二釋二初引論總答故次後為釋論意釋曰三總結上來後釋於彼等七字二初總顯大意次釋二別解七字説於三顯所依上來二顯今疏意今疏鈔其能遍計正義唯六七二識等者揀不正義故論云有義八及諸心所有漏攝者皆能遍計虗妄分別為自性故皆似所取能取現故説阿賴耶以遍計所執自性妄執種為所緣故上皆論文然今説正義乃義引彼論論具云有義第六第七心品執我法者是能遍計唯説意識能遍計故意及意識名意識故計度分別能遍計故執我法者必是意故二執必與無明俱故不説無明有善性故癡無癡等不相應故不見有執導空智故執有執無不俱起故曾無有執非能熏故有漏心等不證實故一切皆名虗妄分別唯似所取能取相現而非一切能遍計攝勿無漏心亦有執故如來後得應有執故經説佛智現身土等種種影像如鏡等故若無緣用應非智等雖説藏識緣遍計種而不説唯故非誠證由斯理趣唯第六第七心品有能遍計此即意云能執我法即得遍計若不能執我法者即不能遍計八識之中前五第八不執我法不能遍計六七二識俱執我法皆能遍計言所計有多者釋成彼彼二字彼論云識品雖二而有二三四五六七八九十等遍計不同故言彼彼既所計有多故云彼彼者何故前云初句能遍計答今以所計對顯能計有多種故屬能計攝其所遍計正唯依他下論具云是依他起遍計心等所緣緣故圓成實性寧非彼境真非妄執所緣境故依展轉説亦所遍計以圓成與依他為所依故親緣依他時亦疏緣圓成也其所執性下論先徵云遍計所執其相云何與依他起復有何別從此方説安慧所立也安慧立意以一切有漏心王心所各唯一自證分是依他起由無始熏習故各似見分相分生起但隨妄情而有道理實無皆遍計所執言雖各體一者王所非一故曰各各各唯立一自證分為依他故曰體一也言其所依體下即前體一義也餘文可知若護法下意云一切心王心所各能變自證分及所變見相二分俱從緣生故名依他起性依此見相二分虗妄堅執決定真實是有是無亦有亦無非有非無是一是異亦一亦異非一非異此二種四句方名遍計所執彼破安慧云若依二分是遍計所執應如兔角等非所緣緣遍計所執體非有故又應二分不熏成種後識等生應無二分又諸習氣是相分攝豈非有法能作因緣若緣所生之內相見非依他起二所依體例亦應然無異因故論中便躡此釋依他性全同今鈔鈔衆緣所生下此下唯依護法正義也論中云由斯理趣由破前之理趣衆緣所生心心所體下全同鈔文鈔頌言分別下彼疏云雜染諸法名為分別依他因緣之所生故或染依他為分別緣之所生故唯雜染故名染分依他無漏諸法名淨分依他亦名圓成實性屬無分別智不可言分別緣所生也故知唯約染分為言鈔或諸染淨下彼疏云或諸漏無漏心心所法俱能緣慮故皆名分別若爾染淨色不相應則非此中依他起攝不能緣慮非分別故答不離心故唯識門故若爾論文何故置能緣言答能緣心遍諸染淨皆名分別並能慮故非緣慮言揀除色等不離心故亦此門攝鈔二句圓成下彼疏云依二空所顯真理一圓滿二成就三法實性具此三義名圓成實鈔釋曰下重配釋也一體周遍故圓滿揀自相色心等一切諸法自相局法體不通於餘故不圓遍二體常住故成就揀共相共相苦空無常等雖遍而非常住成就也三體非虗謬故云實性非虗空非謬故揀妄我以小乘執虗空外道執實我亦體是常是遍等字等取自性冥諦等也亦皆計為常遍今以實字揀之言此一體言貫通三處者謂一體遍二體常三體非虗謬如上可知鈔若爾下揀別前淨分依他也先假難徵起此難論文中無乃鈔主義加也意云若依上三義釋圓成實則淨分依他無上三義何以前云淨分依他亦圓成實耶鈔故次論云下彼疏云淨分亦具三義一離倒體非染故謂離虗妄顛倒故名實二能斷諸惑染是究竟故為成三殊勝作用周遍名圓鈔上來論文下結前已釋頌中圓成實三字鈔次釋餘文下能於能遠離即二空所顯真如性所於即依他起性所遠離即遍計所執性説於彼言下彼疏云言於彼者顯此與依他不即不離依他是所於真如是能於顯如與依他體非即故若是即者真如應有滅依他應不生言不離者即於依他上有真如故非不於彼不可言離若全離者如應非彼依他之性應離依他別有如性云何言於彼故於彼言顯不即離言理非常有者謂虗妄遍計所執實為能取所取於道理中恆非是有故言常遠離也言性顯二空非圓成實者彼疏云此圓成實依他起上無遍計所執二我既空依此空門所顯真如為其自性梵云瞬若此説為空云瞬若多此名空性如名空性不名為空故依空門而顯此性即圓成實是空所顯意言真如是空之性非即是空真如離有離無豈以空義為真如耶但以空為能顯如為所顯故此云性字也鈔上來所釋一依唯識者顯所依也並護法義若下鈔亦不全依故下鈔云論意分前性字二義不同遠離前言已空遍計故是離有而言性者自屬真如故能離無是故結云真如離有離無義故上順彼義釋設順彼宗離有離無遠離前性離遍計有又次偈云此諸法勝義亦即是真如常如其性故即唯識實性此則離無未失彼宗何須傷巧離前性字故今結云一依唯識者顯下亦有不依者也鈔言影出圓成者以疏中但舉依他非即無性便是圓成此意正揀法性宗依他無性即是圓成故疏中不正説圓成乃是影帶其名耳言二性不空者以依他似有圓成實有故也鈔守衆生界等者廣鈔第二云三分半衆生決不成佛名不減始末而言具佛性者久近之間皆得成佛名佛界無性之人畢竟不出生死名生界趣寂種性久近之間皆入寂故非生界非佛界是故生界佛界不增不減鈔四種勝義等者準法苑云初釋名後出體初釋名復二初釋總名次釋別名釋總名者護法釋云勝義者勝謂殊勝義有二種一境界名義二道理名義第三勝義諸論多説即是勝義或四勝義皆勝之義論説依他圓成二性隨其所應根本後得二智境界故其無漏真智隨在何諦亦以勝為義真如為境故通其有財釋第四勝義多依於道理名義廢詮談旨非境界故前三勝義境界為義諦者實義事如實事理如實理理事無謬名之為諦勝義即諦勝義之諦二釋如次世俗者世謂隱覆空理有相顯現如結巾為兔等物隱本之巾兔相顯現此亦如是今隨古名世俗諦又復性隨起盡名之為世體相粗顯目之為俗世即是俗名為世俗或世之俗義亦相違諦者實義有如實有無如實無有無不虗名之為諦世俗即諦世俗之諦二釋如前次釋別名者一言世間勝義者事相粗顯猶可破壞名曰世間亦聖所知過第一俗名為勝義二道理勝義者智斷證修因果差別名為道理無漏智境過第二俗名為勝義三證得勝義者聖智依詮空門顯理名為證得凡愚不測過第三俗名為勝義四勝義勝義者體妙難言逈超衆法名為勝義聖智內證過第四俗復名勝義此中世間即勝義諦乃至勝義即勝義諦皆持業釋或勝義之諦依士無失四世俗中一世間世俗者隱覆真理當世情有墮虗偽中名曰世間凡流皆謂為有依情立名假言世俗二道理世俗者隨彼彼義立蘊等法名為道理實相顯現差別易知名為世俗三證得世俗者施設染淨因果差別令其趣入名為證得有相可知名為世俗四勝義世俗者妙出衆法聖者所知名為勝義假相安立非體離言名為世俗此中世間即世俗乃至勝義即世俗皆持業釋次出體者第一勝義體者成唯識説謂蘊處等事涅槃亦云有名無實名第一義蘊處界等亦是勝義第二勝義體者成唯識云謂四諦等因果體事涅槃亦言苦集滅道名第一義諦第三勝義體者成唯識説依詮門顯二空真如涅槃亦言無八苦相名第一義總觀諸法為二無我故無苦等八名勝義也第四勝義體者瑜伽論説謂非安立一真法界涅槃亦言實諦者即是如來虗空佛性又言無燒割等名第一義不依無我而顯真故前三勝義有相故安立第四勝義無相故非安立第一世俗體者顯揚論説謂所安立瓶軍林等等於衣飲食車兼嚴具城舍等一切物也我有情等或無實體或體實無但有假名都無體性然通有用無用二法瓶等有用我等無用涅槃十三云有名無實如我衆生乃至旋火之輪及名句等五種世法是名世諦衆生等無用火輪等體無第二世俗體者瑜伽論説所安立蘊處界等涅槃亦云諸陰界入名世俗即有為諸法體事有別體用異於初俗第三世俗體者顯揚論説謂所安立預流果等及所依處即諸聖果四諦理等涅槃亦云有八苦相名世俗諦第四世俗體者瑜伽説即所安立勝義諦性涅槃説言若燒若割若死若壞名為世俗由可燒割等無有常一我法等相即二無我名為世俗諦也第一世俗體假安立後三世俗體有相安立也鈔又四重中下法苑又云初一世俗心外境無依情立名遍計為體第二世俗心所變事後二世俗心所變理施設差別即前三真皆依他為體其第四真唯內智證非心變理圓成為體也鈔意云等者謂若前念能引者為因不滅與後念所引之果相見則前念者為常今由因滅故非常若後念所引之果不續即前因無所生則為斷今由果生故不斷既非斷常故名中道言廣如唯識者論具云問阿賴耶識為斷為常答非斷非常以恆轉故恆謂此識無始時來一類相續常無間斷是界趣生施設本故性堅持種令不失故轉謂此識無始時來念念生滅前後變異因滅果生非常一故可為轉識熏成種故恆言遮斷轉表非常猶如暴流因果法爾如暴流水非斷非常相續長時有所漂溺此識亦爾從無始來生滅相續非常非斷漂溺有情令不出離又如暴流雖風等擊起諸波浪而流不斷此識亦爾雖遇衆緣起眼識等而恆相續又如瀑流漂水上下魚草等物隨流不舍此識亦爾與內習氣外觸等法恆相續轉如是法喻意顯此識無始因果非斷常義謂此識性無始時來剎那剎那果生因滅果生故非斷因滅故非常非斷非常是緣起理故説此識恆轉如流疏同時四相滅表後無者上句對舉終教下句顯彼不同或可二句皆彼宗義唯識疏云相謂相狀標印名相由此標法知是有為俱於現行法上立此四相故云同時四相其滅一種法歸過去方始顯故若爾何言滅表此法後是無答對生等相名後即現在法於後無時名之為滅假言過去過去體無實非彼世鈔成唯識等者一段論文準今注及彼疏意科分為三初標立相意成唯二釋成四相四初別説四相本無二約世揀小前三三釋通外難如何四述相所表生長三結成是假故此鈔生位暫停等者論云生已相似相續名住即此相續轉變名異彼疏云法暫停名住與前後念法別名異生滅可知今以疏文為論文也鈔注揀異小乘等者彼疏但科云約世辨百法鈔云小乘説未來世中所相彼生相遷流入現在名生等俱舍論云本無今有生相續隨轉住前後別住異相續斷名滅此頌四相行相與大乘同但約時異長行云四相雖許俱有用時別故謂生作用在於未來現在已生不更生故諸法生已正現在時住等三相作用方起非生用時有餘三用故雖俱有而不相違上皆論文釋曰由此論故唯識論中次今引論文之前先破有宗云若生等相體俱有者應一切時齊興作用若相違故用不頓興體亦相違如何俱有又住異滅用不應俱能相所相體俱本有用亦應然無別性故若謂彼用更待因緣所待因緣應非本有又執生等便為無用所相恆有而生等合應無為法亦有生等彼此因果不可得故又去來世非現非常應似空華非實有性生名為有寧在未來滅名為無應非現在滅若非無生應非有又滅違住寧執同時住不違生何容異世故彼所執進退非理此下連然有為法因緣力故同此鈔引彼疏大段科云自下第二述自義也鈔如何無法等者彼疏云此外人問滅若是無如何與現在有體法為相表此後無下彼疏云此論主答不表法現有但表法後無因明者説無得為無因故亦無過若爾即龜毛等應立為相答此不同彼非後無故本無今無故非是相鈔別釋表義者彼疏云此文正述説相所由及相所表意義可知鈔依此剎那假立四相者次後論云一期分位亦得假立初有名生後無名滅生已相似相續名住即此相續轉變名異是故四相皆是假立此假破有宗四別皆實然有宗亦依一剎那立但有實為異也問一剎那中何得四相名義如是差別時既極促理亦難知答古人有錐插紙喻如百番紙用利錐一插插則同時而百番皆透其錐必次第而透應有百重生住異滅皆同一時必見一剎那中有四相前後理應然也故仁王説一剎那中有九百生滅也問滅表後無應屬未來何云過去耶答以滅位是無故云過去以現在落謝故也若望次一剎那中生相等却在未來正當生時還屬現在故異小乘思之鈔因明斷證復説緣境下口科分二初總標三義因相二別釋三義三初緣境別二初泛明別照根本後依疏具釋二初雙觀義説後別照以其二斷惑別二初正釋斷義二初自宗斷惑二初正釋斷別二初有斷無釋言斷後二俱有斷釋二初成立後得有斷護法後引論具證二初引論故瑜後釋義相傳後結顯不斷斷迷後揀異性宗不同後顯疏文略北中三證理別二初別顯能證二初正辨言以後揀異土明後雙釋能所二初揀異前緣後正釋能證鈔了俗由於證真等者此暗用唯識論意正當四智緣境中大圓鏡智緣境之文今當引之對文自見論云大圓鏡智相應心品有義但緣真如為境是無分別非後得智行相所緣不可知故有義此品緣一切法莊嚴論説大圓鏡智於一切境不愚迷故佛地經説如來智境諸處境識衆像現故又此決定緣無漏種及身土等諸影像故行緣微細説不可知如阿賴耶亦緣俗故緣真如故是無分別緣餘境故後得智攝其體是一隨用分二了俗由證真故説為後得上皆論文今正用此意謂既後得智了俗由於證真即顯後得智有雙觀義由根本智證真方能了俗即顯根本智有雙觀義故二智皆雙觀也鈔根本智斷迷理隨眠等者十地疏云眠伏藏識隨逐纏繞故迷事理境故立二名體即二障種子然雖亦斷現行約正斷時現行已伏正斷種子故也然此段鈔文全依唯識第十釋能斷道中文有二師義今當逐段具引論文初有斷無斷者論云有義根本無分別智親證二空所顯真理無境相故能斷隨眠後得不然故非所斷唯此今鈔應云根本智斷迷理隨眠後得不斷今不爾者應是後人隨意加之或別有所據今且依論科之鈔護法云下即二智俱有斷也論云有義即護法正義也後得有分別智雖不親證二空真理無力能斷迷理隨眠而於安立非安立相明了現前無倒證故亦能永斷迷事隨眠成立後得有斷也意云後得智不斷者不能斷迷理隨眠不親證理故而於安立四諦之理無顛倒證知體是依他故但斷迷事隨眠被疏云迷理隨眠行相深遠要證彼理方能斷之迷事隨眠行相淺近雖實有相觀亦能斷之準百法鈔問後得智能斷惑者未審能斷何惑答慈恩有二解一云但約二乘後得智能斷俱生中迷事隨眠不約菩薩説也即顯煩惱通本後二智能斷若所知障唯根本智斷二云菩薩後得智亦能斷所知障所知障中有迷理迷事迷理執故難斷唯根本斷若迷事非執易斷後得亦能斷鈔故瑜伽説等者即護法引論為證也具云故瑜伽説修道位中有出世斷道世出世斷道無純世間道永害隨眠諸見所斷及修所斷迷理隨眠唯有根本無分別智親證理故能正斷彼餘修所斷迷事隨眠根本後得俱能正斷上皆論文釋曰此護法引瑜伽出世斷道證根本智斷迷理隨根本智名出世間者唯識第九云是出世間無分別智斷世間故名出世間二取隨眠是世間本唯此能斷獨得出名或出世間依二義立謂體無漏及證真如此智具斯二種義故獨得出世即十地中無分別智也今由此智斷迷理故名出世斷道也引世出世斷道雙證根本後得斷迷事隨眠言世出世者揀純世間故意言是世之出世故云世出世此約修道位中云迷事惑目之曰世揀純世間復云出世此斷道既通二智故引為證也或可此迷事是後得所斷道曰世亦是根本所斷道故復云出世也鈔相傳釋云下正體者即根本智釋上可知鈔斷迷理時等者雖明緣境意顯斷惑不即也此明所緣不即既言下明能斷不即亦顯所斷不即也鈔不同法性一斷一切斷者此言法性即是終教終教理事相即二智雙融若根本既即後得正斷迷理時亦能斷一切迷事即是一斷一切斷若後得智亦即根本亦能證如正斷迷事時一切迷理亦斷亦是一斷一切斷也此約理事無礙不約圓宗事事無礙言通意別故又準教義説終教菩薩於二障中不分俱生及分別但有正使即是種子正所斷故十地疏引十地論云隨順逐縛義故如世公使隨逐衆生得便繫縛又楞伽云如鼠毒發回向鈔楞伽云西方有鼠囓人甚毒在身中其瘡雖差忽遇雷聲其瘡還發正使亦爾忽遇境雷則還發動及習氣地前伏使現行初地斷使種子初地已上除習氣佛地究竟淨此上總明下別釋云然三賢位中初既即不墮二乘地故煩惱障自在能斷留故不斷為除智障等故故梁攝論云十解即十住位已去得出世淨心又云十解已上名聖人不墮二乘地仁王經説地前得人空而不取證等又起信云得少分見法身作八相等皆此義也此留惑義此法相宗較一增祇劫光也以此菩薩唯怖智障即所知障故修唯識真如等觀伏斷彼障然於煩惱障非直不怖不修對治亦乃故留助成勝行是故二障不分見修不同法相見道斷分別修道斷俱生至初地時正使俱盡名一斷一切斷彌勒所問經論云菩薩見修道中一切煩惱能障利益衆生行故即見道中一切俱斷地地之中但除習氣至佛果位習氣俱盡準此則餘説四相等隨位別斷皆是寄惑粗細顯位優劣鈔唯約根本斷惑而説者出能證體唯字揀非後得後得不證理故鈔上明下揀異也問根本斷惑上已辨明今何重耶故此揀也音釋謬靡幼切誤也瞬式閏切目動也錐之惟切針也插初洽切刺入也較古教切兵車也
