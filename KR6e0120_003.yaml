body:
  text: 蒼山再光寺比丘普瑞集疏剖裂玄微昭廓心境者玄微與心境即所詮之義剖裂與昭廓即能詮之經鈔外略申三解一揀偏顯圓釋二上通下總釋三迎前帶後釋初者如五教相望小教詮生空等雖曰玄微望始教二空則為淺近也如次終教理事無礙頓教絶待真理雖曰玄微望華嚴經皆淺近也故獨此經得剖裂玄微之稱言昭廓心境者小乘心外有境始教雖攝境唯心猶存八識終頓雖明真心然猶未得心境無礙一即一切故獨此經昭廓心境二上通下總釋者上句通指上法界宗體剖裂在於經中下句總廓心境收一切法故鈔云因果萬法心境普收三迎前帶後釋者以今玄微心境即上法界宗體必迎前所詮目此能詮又剖裂昭廓雖是能詮若不帶後説主是誰剖等鈔故難思議者以上所詮難思議故能詮亦難思議也謂以雖昭廓而言無在而昭廓等不可作言與無言之思議也鈔謂於無障礙法界者然此法界非界非非界非法非非法無名相中強為立名名為無障礙法界問上云玄微即前法界多義今剖玄微為心境何獨剖無障礙法界耶答上雖有多義法界皆不離無障礙法界約能歸有多所歸唯一故鈔一真法界者未分理事等殊絶待曰一非妄曰真問上云無障礙今云一真有何異耶答無異也約離過義名為一真約具德義名無障礙體即一也體絶對待本無內心外境一理多事等殊為引生悟入義分心境為趣入之門也鈔故下裕公云者下宗趣疏中引即靈裕法師也彼謂法界門中義分為心境諸佛證之以成淨土法界即是一心諸佛證之以成法身等此但證義分心境非證能所證也從則二皆所證下是鈔出彼意也問上立義以心為能證境為所證今引證如何却以心為所證耶答心有王所不同若總望境為言則王所皆名心故得為能證若約人運智則王所別明故心為所證心所中智為能證也故諸佛語其總體尅性唯智能證心境皆為所證此所證唯在果鈔所證之境下却以心為能證也能所證通因果故以佛華嚴為能證也鈔文中廣説者既配一題此即經字準此則亦剖裂於心境及前法界多義也鈔若凡等者地前為凡地上為聖等覺已下為因妙覺為果此等心境廣明故鈔出現品下以佛果心境例餘心境也佛境者經云云何知應正等覺境界佛子菩薩摩訶薩以無障無礙智慧知一切世界境界是如來境界一一切三世境界二一切剎土三一切法四一切衆生五真如無差別六法界無障礙七實際無邊八虗空無量九無境界之境界是如來境界十一切世間境界無量如來境界亦無量乃至無境界無量又云應知如來智海無量從初發心修菩薩行皆佛境界應如是知疏云正顯分齊之境兼辨所緣之境分齊即因果理智凡聖有無等即無分齊之分齊境所緣則齊佛所知二義相成皆難思之境界矣如來心者出現亦云如來心意識俱不可得但應以智無量故知如來心譬虗空為一切物所依而虗空無所依如來智慧亦復如是為一切世間出世間智所依而如來智無所依等總有十相如經鈔諸位心境例此可知者如三四五會明內凡三賢心境第六一會明十地菩薩心境第七會初六品明等覺心境廣如經説下皆準此鈔如云欲知下亦以觀佛心例餘也此偈即出現品如來心也長行如次上所引疏云諸乘之智依佛智生而佛智果滿更不依他問豈不依心及依理耶答此中王所無二故無智外如故然此中言令觀佛心者如何觀耶鈔主云欲言其有同如絶相欲言其無幽靈不竭欲言其染萬纍斯亡欲言其淨不斷性惡欲言其一包含無外欲言其異一味難分欲謂之情無殊色性欲謂無情無幽不徹口欲談而詞喪心將緣而慮亡亦由果分不可説故是知佛心即有即無即事即理即王即所即一即多心中非有意亦非不有意意中非有心亦非不有心王中非有數亦非不有數數非依於王亦非不依王一一皆示圓融無礙即觀佛心義也鈔又云若有下出現品偈後空心境中亦引當具釋之疏云初二句總以喻顯後二句約法別顯別顯有二妄取如彼淨空無雲翳故斯則真止二觸境無滯如彼淨空無障礙故斯即真觀此觀不作意以照境則所照無涯此止體性離而息妄故諸取皆寂若斯則不拂不瑩而自淨矣無淨之淨則暗蹈佛境此為心要後學思行既遠離妄想空能觀之心及空所取之境令心所向皆得無礙鈔又云若有欲得下十地品文疏云勸修利益初句所求次句空妄心也次句不許斷常通達平等空妄境也亦無平等之念以遠離微細念故能如是修疾作人天大導師也鈔云何張小下意云心境不互全收皆名為小心境互收張小使大也故下經云者即回向品文疏中自有三釋一約如體性空故如外無智等二如智一味同一真體安得智外更有如耶三事事無礙舉一全收佛智稱真收法界盡差別事法皆隨所依理在佛智中況所證如寧在智外評曰第一義順前心境空義次義即下終教中所引義今正用第三義故證如智相收也鈔真心真境下通難也此牒難辭然此難與答真妄影略問準答妄具難應云真心真境本自無涯無可張小妄心妄境本自局小如何使大答中應云真體雖爾若非經説無由得知妄隨情局經説即真名張小使大也鈔經云下問明品文疏云上句總標體深次句分量廣大故佛地論引經釋云諸佛境界唯除虗空無能為喻下二句云一切衆生入而實無所入鈔又云下法界品文疏釋云即二十一種功德中於所知一向無量轉功德也謂佛無障礙智於一切事品類差別無著無礙故今唯取其如空廣大之義下句云其心本來常清淨鈔知妄本自真下須彌偈讚品文疏鈔云遍計所執理本是無今既知妄本真則見依圓名見佛清淨也鈔如心佛下晉經夜摩偈讚文也下釋云心為總體悟之名佛成淨緣起迷作衆生成染緣起雖有染淨心體不殊然上三各有二義總心二者一染二淨佛二義者一應根隨染二平等違染衆生二者一隨流背佛二機熟感佛各以初義成順流無差各以後義為返流無差上約橫論若約一人心為總相佛即本覺衆生即不覺無差可知鈔皆張妄心者影取妄境故以上文中亦有妄境即真之義也或云此約唯心門境不離心故鈔因果萬法等者問經中昭廓無邊之法何以但言心境故此答也如或有別説不同則隨一一事皆有張廓也準此則前三義別説因果萬法亦然疏窮理盡性徹果該因者大意如鈔今鈔外別伸二解一望前總別解二望後揀餘解初者科云別顯深廣者由上總明能詮剖裂玄微昭廓心境然未知玄微心境窮理盡性徹果該因否故此別顯前總中玄微等理無不窮性無不盡果無不徹因無不該故云爾也二望後揀餘者對下結法所屬唯華嚴有窮理盡性等反顯餘經於理未窮於性未盡於果未徹於因未該也如法華等尚於事事無礙理趣未窮況餘權教耶又餘經雖明佛性未顯法界性雖明三身之果未徹十身滿果又徹果唯屬果未能屬因故又雖該因未徹五周圓融之因又該因唯屬因不能屬果故並非深廣以揀之也鈔理謂理趣道理等者理性各二義釋然理雖通真理今對性字故唯目理理二訓然理趣則義有所歸道理則但可詮顯如言火但詮顯火而非水等名道理若言要火本欲成食溫身等名理趣餘則例然今皆窮極故云窮理性二訓約法約心分二義也如在有情數中名佛性在無情性中名法性之類也其體是一然下疏云法性者法謂差別依正等法性即彼法所依體性即法之性故名法性又性以不變為性即此可軌亦名法性此則性即是法故名法性此二並不變釋一切法各無性故名為法性即隨緣之性法即性也鈔釋云法性三義前之二義雖依主持業不同然皆與法不得相即以不變之性非妄法故第三隨緣與法不離不即不離方為真性評曰今通此三故約深也二心性者若與妄心為體故云心性即心之性若與真心為體心即性故依主持業二釋如次上之二性今經皆盡故云盡性也鈔昔者聖人作易下彼疏云昔者聖人之畫卦作易也本意將此易卦以順從天地生成萬物性命之理也鈔注云者即韓康伯注也言生之極等者有本以極字皆是傳寫誤耳準易注皆極字彼疏釋云命者人之稟受有定分從生至終有長短之極故云命者生之極也此所賦命乃自然之至理故窮理則盡其極也鈔即以極字下鈔主釋也言取意即別者即上二理二性也鈔言徹果該因等者一段鈔文準指玄略為科排分二初今四字通深廣二義二初略標二義言徹後廣釋二義二初證釋成二初釋廣徹究後釋深若云後重料揀二初辨其廣義直目能詮經上約後釋其深義轉歸能詮經二初證釋却是所詮今約後通妨轉歸能詮而其後古八字唯局深一義然因鈔言徹究五周之果者一所信因果即初會六品後二品是二差別因果從第二會至七會中隨好已前是也謂第七會中前之六品并前六會是因不思議等三品是果亦名生解因果三平等因果即第七會中後二品也普賢行品為因出現品為果亦名出現因果四成行因果即第八初明六位之因後明八相之果亦名出現因果五證入因果即第九會中初明佛果大用後顯菩薩起用修因因果二門俱證入故也言六位之因者即第二會十信第三十住第四十行第五十向第六十地第七等覺鈔若云因該果海等者釋深義初發心時便成正覺即梵行品意具如下引言雖得佛道不捨因門者法界品意位後普賢故寂照云文殊雖已果滿反為佛子證果徹因源也迦葉上位菩薩却禮初心因徹果也以涅槃中彼説偈云發心畢竟二無別如是二心初心難自未得度先度他是故敬禮而發心等是也鈔上約廣義等者指玄云上字緣文隔越指前廣義名上今字無隔指上深義名今言以因徹彼果故者徹字誤書應是該字上釋徹果此解該因故或是行文影略互顯不錯無妨鈔而其能詮者釋妨也問既深義約所詮者如何科云別歎能詮故云爾也鈔然因該果海下顯用文字以上句用易即全用其文而不取其意下句用古人之言然欲含其深廣故略彼四字也疏汪洋等二句既結且歎上句別歎深廣下句總歎深廣雖廣大悉備合當廣義然約深廣皆悉備談故云爾也謂上句四字即為四句汪即是深洋即是廣沖即非深非廣沖者中也以雙遮顯中故融即亦深亦廣下句即四句皆備也鈔沖亦深也者以雙非故深言中也者準道教則道體離天地之二邊故中今以離理事二邊故中也和者唯準道教釋也鈔老子云者即彼道沖章第四中文也彼注云道出沖和之氣而用生成萬物有生成之功而不盈滿云或似者於道不敢正言彼疏云沖虗也謂道以沖虗為用也鈔融者融通下無不融通謂之廣難窮源底謂之深鈔故肇公云下即涅槃無名論意也意云汪哉甚深洋哉甚廣四生九類何有不由此本性清淨之涅槃也鈔八師經者梵志此云淨行言暗旬者撿本即耶旬或是別譯但梵音輕重耳彼經次云巍巍堂堂猶星中月神智妙達衆聖中王諸天所不及黎民所不聞願開盲瞑釋其愚癡所事何師以致斯尊天尊答曰快哉斯問發開大行吾前世師其名難數吾今自然神曜得道非有師也然師有八謂一殺二盜三淫四妄五酒六老七病八死吾見此八事多諸過患因而修道離苦獲安故曰八師釋曰前五即戒防非故無六道之業斷集也發善故為出世之因修道也後三由見苦果即知苦也以斯成道即證滅也今但取其汪洋之言所出耳鈔亦如沖和等者上唯引文所出此下方配釋經謂所如即沖和之氣用生成萬物無有盈滿能如之經即出生無盡義理無有盈滿時也問上引三文證其汪洋沖之三字何故唯約老子配釋答雖引三文餘二文約法顯其深廣故不須配唯老子沖字對此是喻故須配釋也鈔融通下出上融字深廣之相也上句廣下句深故鈔兼三才者説卦云立天之道曰陰與陽立地之道曰剛與柔立人之道曰仁與義兼三才而兩之故易六畫而成卦也彼疏云八卦小成但有三畫於三才之道陰陽所以重三為六立天之道有二種之氣曰成物之陰於施生之陽立地之道有二種之形曰順成之柔於持載之剛天地既立人生其間立人之道有二種之性曰愛惠之仁與割斷之義也鈔強配之者明非正義遮後人之妄解也鈔九會玄文下有二意一云只現行經權小不測故難思深廣故稱海也二云無盡時會之大經名難思教海於現行八十卷中可見難思之經如觀牖隙見無盡空故鈔説真妄等下通人及法上句人下句法也鈔法華佛知見一義者即問明品文殊答九首菩薩問佛境界之知偈也偈云非識所能識亦非心境界其性本清淨開示諸羣生疏鈔云了別非真知了見心性亦非真知故云非識此遣學南宗失意之病意謂真知唯無念方見故瞥起亦非真知起心看心令心不起亦是妄想故云非心境界此遣學比宗失意之病是以真知必忘心遺照言思道斷矣心體離念即非有念可離故云本性清淨衆生等有惑翳不知故佛開示皆令悟入謂開除惑障顯示真理令悟體空證入心體即法華一經不離開示悟入佛之知見也鈔一章必盡其體用者即出現品出現涅槃一章有其十相一體性真常二德用圓備三出沒常湛四虧盈不遷五示滅常存六隨緣起盡七存亡互現八大用無涯九體離二邊十結歸無住此一章必盡涅槃經圓淨性淨之體及方便淨應化之用也鈔三天偈文者謂般若多明性空忉利夜摩兜率各十方來集菩薩説偈讚佛多明性空義也以般若是意此讚佛知故同也鈔一大藏教等者蓋別説難盡故總收之以藏教雖廣皆此所流末不離本又一部之經亦不離本題故謂有人有法有體有用有因有果有喻有法攝義無邊故也是謂下約佛及性相以結歎也上約收教此約收宗故云廣大悉備者矣疏故我世尊等者故字躡前能所詮而起我者疏主自稱寄居傳云西域南海稱我不是慢詞設令道汝亦非輕稱但欲別其彼此故不並神州將為鄙惡若其嫌者改我為今上會解意寂照則云我者尊仰之稱如言我國家等即他君王非我國主天魔外道非我所尊後意為優言世尊者目遮那也此有三釋若順常途具上九號為世所尊故曰世尊若順下經即菩提身具無邊德為世所尊或亦可世即三世間佛為尊故言十身初滿正覺始成者以經中釋初成正覺之相別有十德疏主以配十身一三業普周即鈔所引經是也此別當菩提身二威勢超勝三福德深廣四隨意受生五相好周圓六順身演法七化身自在八法身彌綸九智身窮性相之源十力持身持自他依正若順經義應云始成正覺十身初滿今順文之平仄故倒舉也問既云始成何故下經云我見釋迦成道已經不可思議劫答舊佛新成新佛舊成故況念劫圓融初後一際者哉鈔該下二段者即此説主難思兼下説儀周普二文之中前具四身後有六身十身具矣今疏初句約菩提身上總標十身下二段別釋十身則始成正覺一句別為菩提身之相也總中有別故鈔此下當列遠則依主中列近則次二段文中列也鈔經云下妙嚴文也此即三業普周之文而言等者等餘九身經文也經次文云譬如虗空具含衆象於諸境界無所分別又如虗空普遍一切於諸國土平等隨入上即喻三業也身恆遍坐一切道場菩薩衆中威光赫奕如日輪出照明世界即威勢身超勝也乃至云三世諸佛所有神變於光明中靡不咸覩一切諸佛不思議劫所有莊嚴悉令顯現即第十力持身持自他依正也故知等字等如是經方是十身初滿之相故鈔斷云是初滿也問鈔中何不具引以釋十身初滿之義答鈔見後二段之中顯其九身之義故不必具引重釋也但引菩提身以釋始成正覺一句也言別語菩提之身者以對初句為別故言以是總故者出所以也問既是十身初滿何故別説此身故此答也謂要成正覺餘之九身方圓滿故言始覺下但終教義言下當廣釋者三業普周之文本文廣釋今當粗引疏云具無盡德為世所尊釋世尊也座相現時釋爾時也身即安處經云其師子座高廣嚴好摩尼為臺蓮華為網清淨妙寶以為其輪衆色雜華而作瓔珞乃至廣説莊嚴之事故安處此座也又智處諸法無前後故上釋處于此座也言於一切法者示所覺境即二諦三諦無盡法也成最正覺者示能覺智開悟稱覺離倒曰正至極名最獲得名成此當相解若揀別者一對凡名覺對小名正對因名最對滿名成二對凡曰覺對外道曰正對小曰最對因曰成我佛獨具故云成最正覺言智入下一意業也即二智三智四智無障礙智二智者一如量達俗名入三世二如理達真名悉平等言三智者一俗智覺三世二真智覺平等三中道智覺三世平等言四智者四智通緣三世境故並入三世言悉皆平等者鏡智離分別故依持平等現行功德之依種子功德之持故平等性智自他平等妙觀察智觀一切法自相共相平等成所作智普利平等四智圓融無二性故修生本有非一異故不失經宗其身下二身業也以是十身之總故此其身之言通於三身十身充滿三世間故並是圓遍非分遍也謂一一剎土一一塵等佛皆圓遍非分遍也總看亦現別看亦現其音下三語業也一順異類音經云一切衆生語言海一言演説盡無餘二順所宜如來於一語言中演説無邊契經海三順遍佛以一妙音周聞十方國又圭峯華嚴綸貫中云智入三世平等充滿一切世間普順十方國土其身入三世平等充滿一切世間普順十方國土其音入三世平等充滿一切世間普順十方國土經各舉一邊互影略故言正覺始成者則有五教不同小乘三十四心斷結五分法身初圓名始成正覺是實非化大乘之中約化八相示成約報十地行滿四智創圓名曰始成正覺據實即今古情亡心無初相名之曰始無念而照目之曰正見心常住稱之為覺始本不二名之曰成約頓則法身自覺聖智無成無不成若依此經以十佛法界之身雲遍因陀羅網無盡之時處念念初初為物而現具足主伴攝三世間此初即無量劫之初無際之初一成一切成無成無不成一覺一切覺無覺無不覺言窮慮絶不壞假名故云正覺始成也釋曰前二成事次一事同理成次一唯理後一皆無礙也疏乘願行以彌綸者應先問云果滿十身由何致耶故此答也願以希求為義欲勝解信三法為體即四弘誓願等也行即六度萬行無盡之因行也言彌綸者雙彰願行果用普周之狀意云昔願行既普周法界故佛身則遍剎利生也鈔即是願身者然願不是身是願之身依士釋也問乘因有二何獨以願立身答行由願立從其本故但是願身十身之中不立行身者義亦同此鈔易與天地準者彼疏云準者準擬如乾健以法天坤順以法地之類也彌者彌縫補合綸謂經綸牽引能補合牽引天地之道也今則取其包遍之義可知疏混虗空為體性者因上願行彌綸故得佛身同空包遍下説虗空有四義同於佛身一含攝義二無分別義三普遍義四遍入義出現品身業第二喻云譬如虗空寬廣非色而能顯現一切諸色而彼虗空無有分別亦無戲論合中云如來身亦復如是一切衆生諸善根業皆得成就即含攝義而如來身無有分別即第二義又云譬如虗空遍至一切色非色處非至非不至如來身亦復如是遍至一切法一切國土等即普遍義亦非至非不至即平等遍入義若約法喻説即法性身若唯約法説即虗空身如鈔所明鈔亦有二義者初義鈔亦有二一故下經云下約諸法本空故云混虗空即是性空之義也此性空即法身疏中虗空即體性也二又云下約喻以明即虗空之體性也法身離垢清淨故以虗空為喻也上即理空此即事空俱目法性身也二者約外空下唯約事空為虗空身亦虗空即體性也下八地疏鈔云虗空不可見今世人見者但見空一顯色成實論及涅槃經説虗空唯一不可眼見世人見者但見空中光明之色想心於中知無實物作虗空解便謂見空其實不見又下經云知虗空身無量相周遍相無形相無異相無邊相顯現色身相今混此六相為佛體性也疏富有萬德蕩無纖塵者孟子云富有天下繫辭云富有之謂大業今遮那富有法界無盡之德可謂大業也萬德據法纖塵約喻又萬德據總數以彰無盡纖塵約微細以例粗惑乃文之巧妙也鈔故下經云下即法界品末一偈假設四喻以讚佛德也鈔塵沙無明等者謂無明之數廣有塵沙而皆有種子現行及習氣三也然習有二一業習如阿難迦葉二者煩惱習如迦留陀夷有貪習身子有嗔習周利盤特有癡習畢陵伽婆蹉有慢習等今佛位中三皆斷盡故鈔總即二障等者問塵沙無明與二障何別答此有二義一云塵沙無明即別以所障非一能障亦多不唯二障故言二障者即總束也其中障菩提者皆為所知障涅槃者皆為煩惱故云總也二云塵沙是總約大數故通二障也所障不同分二障別今約初義鈔細中之細等者用起信文勢釋前種現習氣粗細之異起信則約六染以成四句一粗中之粗凡夫境界謂六染中執相應染是內凡三賢所覺境故二粗中之細謂不斷相應染及分別智相應染三細中之粗謂能現能見二不相應染也菩薩境界十地已還菩薩所知境也四細中之細是佛境界根本業不相應染唯佛能了故今此三種分四句者種子一義獨得二句謂望現行是粗中之細望習氣即細中之粗餘二各當一句故云等字可知鈔若總配三德等者問智斷恩與般若等三德何別答智斷恩唯果德般若等通性德也問下斷德可當法身今何二句皆福德身耶答若三德別配三身則爾今約三皆名德即福德身也問既上下諸句皆是別德應皆是福德身答雖皆是德然約別義配於餘身等但以總句為福德身也問萬德為總以含諸德何要解脫法身配上下句答就文顯故疏湛智海之澄波虗含萬象者科云所依定即海印三昧也三昧此云等持平等持心趣一境故若言定者謂心一境性今云三昧科云定者疏主云然三昧為定雖非敵對由平等持心至一境故義旨相順故略云定義如鈔釋鈔今初説經所依三昧等者一段鈔文前後廣略口科分二初懸明疏意二初例舉諸教今初二正明此經二初標名指廣今説後略示相二初約喻二初遠喻今略後近喻亦猶後約法二初現所應根二初正釋如來二引證故下後現能應象二初正釋非唯二引證賢首後正消疏文然此鈔無量義處三昧者彼經云爾時世尊四衆圍繞供養恭敬尊重讚歎為諸菩薩説大乘經名無量義教菩薩法佛所護念説此經已結跏趺坐入於無量義處三昧身心不動等玄贊云觀無相理定名無量義處三昧處謂處所無量義者是教所詮衆義因真理故説真理名處言依等持王三昧者彼經云爾時世尊於獅子座上自敷尼師壇結跏趺坐端身正願住對面念入等持王妙三摩地諸三摩地皆攝入此三摩地中是所流故貞元疏云大智度論説一切三昧皆入此中故名為王體即如如如如本寂真智契此故名三昧言説涅槃等者彼經第三十卷云我於雙樹間入大寂定大寂定者名大涅槃今鈔云不動三昧者依下經出現品云佛子如來應正等覺示涅槃時入不動三昧疏云究竟滅也由寂無動故無所不動耳則名異義同問若爾何以智論説降魔已得不動三昧成無上道則應説華嚴經亦依不動三昧答已却諸魔成無上道孰可動耶與入涅槃時不動三昧名同義異望説華嚴時同定別鈔海印三昧者海印之三昧海印即三昧二釋皆通問經中諸會入定但有藏身等定曾何言入海印而説此經耶答如藏身等定當會別義今海印定即一部通義此應古德義取海印炳現以為所依不然豈得諸會皆一念頓演耶故指涅槃不動亦以此經之文義顯他經之意故知義取爾鈔賢首品疏廣説之者彼疏云今以十義釋之以表無盡一無心能現義經云無有功用無分別故此句即賢首品二現無所現義經云如光影故出現品云普現一切衆生心念根性欲樂而無所現故三能現與所現非一義四非異義經云大海能現能所異故非一水外求像不可得故非異此顯定心與所現法即性之相能所宛然即相之性物我無二五無去來義水不上取物不下就而能顯現三昧之心亦爾現萬法於自心彼亦不來羅身雲於法界未曾暫去上之五義與鏡喻大同六廣大義經云於一念頃遍十方悉能包含無所拒故明三昧心周于法界則衆生色心皆定心中物用周法界亦不離此心七普現義經云一切皆能現故出現品云菩提普印諸心行故此與廣大義異者此約所現不揀巨細彼約能現其量普周又此約所現無類不現彼約能現無行不修八頓現義經云一念現故謂無前後一念頓成九常現義非如明鏡有現不現時十非現現義非如明鏡對至方現經云現於四天下像故謂四兵羅空對而可現此揀也如經云如淨水中四兵像各各別異無交雜等四天之像不對而現故云非現現也以不對待故是故常現該三際也釋成橫竪九竪十橫所以異也具上十義故稱海印諸佛窮究菩薩相似鈔今略示其相者法喻交互亦略具前十義初遠喻中即前第十兼第九義問凡鏡水印物對至方現如何海印不對而現耶答此即海上有希奇之德也賢首品經云海有希奇殊特法能為一切平等印衆生寶物及川流普悉包含無所拒無盡禪定解脫者為平等印亦如是等鈔亦猶下以香水海世人不能見故再舉近水以喻之無來無去即前第五義非有非無即第二義非一即第三義非異即第四義鈔如來智海下約法説此中具四義無心即第一義頓現即第八義一切衆生心念根欲下即六七二義雖十義無遺而不廣釋故云略示又法喻影略而示故云略示也鈔故下經云者即出現品偈唯證第七義鈔非唯下上句顯前有缺下正顯本義鈔賢首品云下然經有六偈純顯現十法界之化用具云或有剎土無有佛於彼示現成正覺或有國土不知法於彼為説妙法藏無有分別無功用於一念頃遍十方如月光影靡不周無量方便化衆生於彼十方世界中念念示現成佛道轉正法輪入寂滅乃至舍利廣分布此三偈頓現佛化用或現聲聞獨覺道或現成佛普莊嚴如是開闡三乘教廣度衆生無量劫此一偈現三乘化用鈔中二偈初偈現餘六類化用後一偈總結大用所依之定意明頓現十法界能應之身應一切衆生心念根欲故也鈔能應所應皆為萬像者前義即所應後義即能應二義同時方為智海含萬像也疏皎性空之滿月頓落百川者問新經疏序云星羅法身影落心水鈔約感應相對分四句中今此疏文唯有一二兩句缺三四兩句謂一一星落一川如一佛應一機二一星落百川如一佛應多機此二句今疏可説三一切星落一川如多佛應一機四一切星落一切川如多佛應多機此二句今疏義缺今文既缺豈得稱滿答今所以不同彼者唯取一多無礙義故雖有多佛本唯一無障礙身雲故兼順彼文不起樹王羅七處之義故又新舊影顯義方足故鈔第二明能應身一段鈔文口科分二初略消疏文此之後具釋疏意二初喻顯謂若二法合二初能依所依異三初總法合能空二引證二故一初月喻身二初水喻機故出後水喻剎智幢後月喻法若準三結顯上皆二能依所依同三初總法合若以二引證二故一初月喻身二初水喻機故出後水喻剎智幢後月喻法若準三結顯則空鈔唯性字是法等者影顯前對亦智字是法餘皆是喻以智該之皆含法喻也今言以性該之餘文皆含法喻二意也含喻可知含法者以法性為所依有報圓之智月分百川之應化月影也無勞異説鈔若秋空下喻及法中皆三身對詳可了鈔譬如下以月喻身唯證化身也喻中四義一映衆星光二隨時圓缺三澄淨水中影無不現四一切見者皆對目前法中亦四一智圓映二乘衆二常身隨宜現壽延促三淨心器中影無不現四見佛之者皆謂對前鈔智幢偈云者雙證報化二身喻及法中各初後一句是報身中間二句皆化身言水亦喻剎者前以百川喻物根明有善皆見今亦喻所依剎顯無所不周鈔若準離世間品下若依前自具十身故下鈔配為化身則唯證化身若依融三世間為十身則此偈證菩薩身及法身之二身也以經云菩薩淨法輪故或唯證法身是菩薩之法輪故唯取法輪喻月也言不為世所雜者悲不失智故雖處世而無染準此則水亦喻於世間鈔若以相歸性者喻中如攝月歸空離所依空無能依月故言空亦名佛者即性空真佛也鈔則空色照水等者以空天之色照現淨水則天之晴空影落淨水言天猶空也者此中晴天字即疏中空字也若次第歸者月影化身歸本月報身本月報身歸晴空法性物根及剎土淨水與晴空一際則唯一法性也又若唯前義則似法報相分若唯次義則法報冥一今雙明二義不即不離方為圓暢
