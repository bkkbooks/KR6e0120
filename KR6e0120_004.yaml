body:
  text: 蒼山再光寺比丘普瑞集疏不起樹王羅七處於法界者問若據經唯三天有不起之言何以今言羅七處耶答據實七處皆應有不起之言經中欲顯異義故只約三天說也謂初二會相鄰接故不假帶前此三天中人天隔越故須連帶又此三會同詮三賢位第六已入證不假帶前第七即位中普賢居然不假第八頓成諸行五位體用已融第九唯明證入體用一味故並皆不假也今約通義故云爾也鈔此樹高聳等者案西域記長一百尺畢鉢羅樹於下成菩提故云菩提樹也鈔而升忉利天等者此云三十三天以須彌頂四面各有八天帝釋居中故云三十三天也等字等餘六處可知鈔故下經云此是四句中第一句下疏云經中欲顯一多相即故舉初句鈔釋云顯經中不盡之由若云不離一樹而升一天難思之相不顯若言不起一樹而升一切忉利天者則不顯本會圓遍若言不離一切樹而升一切天則無一多無礙之相故唯出初句下法慧例云十方悉亦然則方有升一切天之句也鈔三天皆有不起而升之言者忉利如前夜摩經云爾時世尊不離一切菩提樹下及須彌頂而向於彼夜摩天宮寶莊嚴殿等兜率天云爾時世尊復以神力不離此菩提樹及須彌頂夜摩天宮而往詣於兜率陀天一切妙寶所莊嚴殿等問動靜相違去住懸隔既云不離何得言升答佛得菩提智無不周體無不在無依無住無去無來然以自在即體之應應隨體遍緣感前後有住有升閻浮有感見在道樹故云不離覺樹天中有感見升天上故云而升非移覺樹之佛而升天宮等譬如澄江一月三舟共觀一舟停住二舟南北南者見月千里而隨南北者見月千里而隨北停舟之者見月不移是為此月不離中流而往南北設百千人共觀八方各去則百千月各隨去諸有智者曉斯旨焉上皆須彌品疏文也鈔故成四句者即升須彌品中也鈔言如前經文者即前長行全法慧偈中前一偈半也鈔取其結例之文者即法慧偈中後半偈內上一句也其如來自在力一句通四句之因也然此結例一句自有二說一云結與例別所升有二謂一及一切不但升一須彌頂總結分齊則十方須彌頂也皆例同此一須彌頂為所升處云悉亦然問若爾二三兩句皆能升中無文所升中有文何偏言第三無文也答其第二句既許第三句更易寧不許耶故云易故文無義必合有此云無文非一向無但以易故曰無若或取之亦有文也一云此結與例不分二別此句所升唯一切而無一也意云鈔中取長行全并偈前六句為初句次以十方悉亦然一句為所升一切取上能升中別一及總一切相對成二四兩句問何不亦取能升中一及所升一為第三一句文耶答此第三句於結例中無所升一與四二兩句義不齊故謂第四一句能升所升皆有文故第二一句能升無文所升有文故第三一句能升所升皆無文故所以不同也故云其第三句易故文無義必合有問二釋何優答隨情去取若以前長行及所例偈中有所升一為第三句文前解為勝鈔是則下總釋疏意則不起法界菩提樹王該羅遍於法界七處則為一重佛為能遍七處為所遍也鈔今言羅七處下七處二字上為所遍今為能遍通二義鈔略有二意者一即七處平遍如七星總遍百川二即七處互遍亦云別遍如七盞燈一一遍餘六燈更遍一室鈔旦初義者下此亦有二一即次第遍二直遍且初中言說處中十重者一閻浮提七處二同類百億三異類四剎種五華藏六餘剎海七前六類塵八虗空容塵之處九猶帝網十餘佛同鈔然下十重下揀別前後也所依下進顯難易也鈔今直下顯直遍之相以五重與法界合說故云直就遍法界也鈔二遍異類剎中者此上缺法界二字此重即收後十重中四重謂異類剎剎種華藏餘剎海之四重也餘四各當其一鈔二令一一下釋七處互遍也有本改等七處與遍七處亦遍非七處之處并一一皆遍七處此四箇七字皆為六字並非也此是第二番約互遍釋疏羅七處於法界也若改作六有所缺故今以義求能遍却為所遍故或別得總名故不可改也鈔色界十八者謂初禪有三天二禪有三天三禪有三天四禪有九天義如常說等者等餘三州及四空等並非說經處故鈔更細而論下進顯七處之塵遍也如菩提場中一一塵遍上五重是則能遍一處中有一切處亦以餘六處一一塵俱遍菩提場中則菩提一處有一切處也如菩提既爾餘六處亦然鈔前三約事等者此就所遍為言故單約事其第三重雖遍塵中之剎然是一重平遍意在所遍剎故或可前之剎字應回置微字之上碎剎為塵遍所碎之塵故唯約事也若能所合論皆事事無礙唯遍第四似兼理事無礙有理空故鈔由事下顯遍因也即法性融通之因疏無違後際暢九會於初成者上句圓融不礙行布下句行布不礙圓融暢者敷揚之謂也故易曰宣揚發暢孝經序云約文敷暢問今言初者尚總是幾日之初答淮下疏有三意一約不壞前後相說才成初七日說前五會第二七日說十地等第九一會在後時說二順論釋皆在二七日後二七日非久亦名始成三約實圓融釋皆在初成一念之中一音頓演七處九會無盡之文今此初成之言雖通三釋今文正取第三一念之初暢斯九會也然即十世隔法異成門初句十世隔法九會前後不同下句即異成也一念頓演故所以初說者論云示法勝故及勝處說故不同餘教三七等別雖普曜彌沙塞等皆言二七說此表末不離本故鈔謂菩提流支者約文理分為三時以經初云者證初會是初成說三天下證第三第四第五會皆在初說其第二會義准應在初時說言婆伽婆者涅槃云能破煩惱名婆伽婆即斷德法身亦舉此具攝十身也即佛地經說婆伽梵但梵音小異而自在示不繫屬煩惱故熾盛猛焰智火所燒煉故端嚴三十二相所莊嚴故名稱一切殊勝功德圓滿無不知故吉祥一切世間親近供養咸稱讚故也尊貴具一切德常起方便利益安樂一切有情無懈倦故上依本論付也之六義也七八一會在十地品後亦在第二七日後說例此前說則第九會在後時說以有下出所以也言有身子等者十二遊行經云成道五年方度身子彼云佛成道第二年度五比丘第三年度迦葉兄弟三人五年度身子目連准此祗園又在身子之後以佛在王舍城舍衛國須達長者為子娶妻至於王舍城遇佛發心請佛往本國佛敕目連相與偕行先造精舍等鈔賢首等者准探玄記即取第二七日頓說九會不許五會在初及第九在後也故彼破云以初七日並不說法十地論云思惟因行緣行故設有救言只不說十地非不說餘法則不得言思惟也下論又釋為顯己法樂是故初七定不說爾又第九會彼云第八今順唐經亦非後時何得於一部經前已說半中說餘經後方始續豈令佛無陀羅尼力不能一念說一切法是知此經定是第二七日所說問據此則賢首是第二七頓說此經何故今云初成頓說耶答賢首之意不定二七謂若約論文定則初七不說若約法定義初成頓說故旨歸云初唯一念二盡七日縱約二七去成道未久亦初成頓說也不同流支三時故所以異也鈔今疏會取下正會取賢首無違流支意云既旨歸前後際而無涯流支第九在後五年亦有何過然疏主亦用賢首意會故引旨歸證之明非新意也鈔分於三時約所表者妙嚴品疏鈔云疏初五會信解行願最在初故皆云不離道樹第六因地證位居其次深故無不起菩提樹言法界極證最在後故亦顯二乘絶見聞故問華嚴教旨時乃圓融要歷三時豈通玄趣答常恆之說說無息時後時不說豈名常耶問一音頓演何要三時答雖能頓演表法淺深問若表三節三七日中一七一節足得成表何要第九五年後耶答三七未有身子等聲聞不能顯於不共教故須後時問時不圓融豈順經旨答正融於異時故作此會也鈔又分三時等者升夜摩品疏云時而後言聞者悅伏時而後動見者敬從鈔上之二段者處與時也皆分十故云廣辨也疏盡宏廓之幽宗被難思之海會者上句能被教皆科云所被機者約能目所故下句所被衆言會者聚義聚集多人共在一處名會餘義如鈔問據下列衆初會四十二衆或四十五衆同生一異生三十九師子座衆一兼菩提樹中所流一及宮殿中無邊菩薩及新集衆眉間衆總有四十五衆也總九會都數有一百七十五衆既可標列那云難思耶答只由此衆故說難思下疏云然此諸衆或總為一一乘衆故或分為二以有實衆及化衆故或可為三人天神故或可為四佛菩薩人非人故或五非人開天神故或六加畜生故或七天分欲色故或分八菩薩有此界他界故或九他方有主伴故或十加聲聞故或一百七十五加前說故或無量無邊義類多方故一一或以剎塵量為數故又如新集菩薩毛光出衆例上皆爾故一一衆皆無分齊此猶約相別若融攝一一會中皆具一百七十五衆以稱法界緣起之會互相在故上且約一界若通十方及異類剎塵帝網無盡無盡是為華嚴海會衆數據此則足見難思也鈔宏者大也者即事法界廓者空也者即理法界幽者深也者即後二法界也以四法界為能被之宗教故上指在旨趣玄微之中鈔謂普賢等者問說法豈欲被普賢等耶答出現疏云所謂圓根不揀凡聖以法為師何非所被問涅槃云諸佛所師所謂法故則遮那亦成所被耶答遮那以為教主則不謂所被問十方諸佛為所被答是遮那類故非所被問普賢文殊道圓上果何成所被答今就迹門故為所被經云普賢行人方得入故但善財等成所被義增普賢等稍隱皆為所被此應與下所被根互有影略今且說當時海會耳鈔數廣剎塵者或菩薩數廣或上德數廣通二義故鈔真應權實者真謂海會真實本身應是海會應現雜類之身權乃權巧佛果權現雜類之身或權即上應實同上真言類例多端者應類上深廣相奪說也謂即真而應等又有因果本迹等類非一故言尤不可思者以果海離念此等菩薩細念已亡故尤不可思也又已該徹果海是不捨因門之人鈔故初會下示難思之文也略列四十二衆者一海易等十菩薩同生衆同配初發心住二執金剛神三身衆神四足行神五道場神六主城神七主地神八主山神九主林神十主藥已上如次配十住十一主稼神十二主河神十三主海神十四主水十五主火十六主風十七主空十八主方十九主夜二十主晝已上十行二十一阿修羅王二十二迦樓羅王二十三緊那羅王二十四摩睺羅伽王二十五夜叉王二十六龍王二十七鳩盤茶王二十八乾闥婆王二十九月天子三十日天子已上配十回向三十一忉利天王三十二夜摩天王三十三兜率天王三十四化樂天王三十五他化天王三十六大梵天王三十七光音天王三十八遍淨天王三十九廣果天王四十大自在天王上十地也四十一師子座衆配等覺位四十二眉間衆配妙覺位言皆以剎塵等者經云有佛剎微塵數執金剛等鈔況口光所召下進顯廣多現相品說佛口衆齒放佛剎塵數光明照十方各一億佛剎微塵數世界海中菩薩衆一一菩薩各領世界海微塵數菩薩為眷屬來其諸菩薩身毛孔中一一各現十世界微塵數寶光一一光中復現十世界海微塵數菩薩此即毛光重現此諸菩薩遍入法界諸安立海所有微塵此即周入剎塵彼一一塵中皆有佛剎微塵數諸廣大剎此即依作用也前廣大剎中皆有三世諸佛此諸菩薩悉能親近供養即正作用也既皆供養三世諸佛故云該攝三際此等之義大位菩薩尚不能思況凡情可測耶可謂義深難信思惟難解應教難說數極難量是故總云難思海會疏圓音落落該十剎而頓周者起信疏云一一語音遍窮生界即圓義也而其音韻恆不雜亂即音義也若音不遍是音非圓若音等遍失其韻曲則是圓非音今不壞曲而等遍不動遍而韻差此是如來圓音非是心識思量境界鈔說經本者即說經之本也以言音乃經教之本非即是經教以教自在機故言疏遠者遠近聽之無大小故鈔經列二十者華藏品中具列謂回轉形世界褶褻往來之形也江河世界旋流形河海深淵之處水施流也輪輞形壇墠形築土曰壇除土曰墠樹林形樓觀形尸羅幢形此云美玉以玉為幢也普方形胎藏形蓮華形佉勒迦形此云𥬵淮南子云𥬵囤也以判竹圍器可以盛穀也衆生形佛相形圓光形雲形網形門闥形內門也須彌形嚴具形言結有十佛剎者以經中上一一形各結有十佛剎塵數如言有十佛剎塵數回轉形世界等問既經列二十異類何以疏中但云十剎鈔答云舉十以彰無盡故鈔圓音之義下當廣說者即出現品中十喻廣說一劫盡唱聲喻喻如來說法音聲無主二響聲隨緣喻喻如來音聲無生滅或云無示三天鼓開覺喻喻如來音聲無斷絶四天女妙聲喻喻如來音隨根信解五梵聲及衆喻喻如來隨時分音六衆水一味喻喻如來無邪曲音七降雨滋榮喻喻如來隨樂欲音八漸降成熟喻喻如來無遲速音九降霔難思喻喻如來音雖差別同一性故十遍降種種喻喻如來音普遍或云隨類音又彼文有六句料揀謂非量第九非無量四五二義非主第一非無主第六非示二三兩義非無示七八十三義也初對約相雙存顯中道次對約體雙非顯中道後對約用雙非顯中道也經文極廣不能具引須者往檢鈔一音之中具一切音者准梵摩喻經有八種音一最好音如迦陵頻伽故二易了音言辭辨了故三柔軟音無粗獷故四調和音大小皆中故五尊慧音無戰懼故六不誤音無錯誤故七深妙音臍輪發聲故八不女音其聲雄朗故然此且約一相而說理實前十喻之音一具一切方是圓音之義也鈔佛演一妙音等者現相品偈也疏鈔釋云初句唯一妙音即天竺一梵音故次句稱性故遍聞音問聲四達曰聞次句理融故一具一切次句彼一一音雨多法雨四諦緣生六度等法悉充滿故次句隨說一法文詞深廣故次句隨前一音外通物情之類故次句此音各各遍一切處故末句所說各顯性淨之理故疏主伴重重極十方而齊唱者餘經隨機別說無此重重極於十方故唯此經說儀周普也問七科皆云說儀普周何故此科獨得說儀之名答由此六科辨定身處時衆音皆周法界故方得有此主伴重重故前前別說此得通名理實前六皆說儀也或可上約遮那一佛說儀此則別是通方說法儀式鈔別示說儀中一段鈔文口科分二初正釋此疏三初總標謂是二牒釋二初釋主伴然相後釋重重二初互望論重重言鄰後互遍論重重三初此佛為主重重二初約第二會顯重重三初標略有二釋二初布定主伴遠近謂遮二釋成法喻重遍二初壓東一重三初法若此二喻如是三合義當二顯餘重重二初法如是後喻如人三結說一二例諸會顯重重如是二彼佛為主重重十方三彼此相望重重如是三結指故云二通前配屬然上鈔謂是通方之說者釋齊唱亦釋科中別字鈔略有三句者皆約說者為主證者為伴非約聽者約主唯一約伴須多然因人果人雖皆通主伴而主伴不雜故下疏云主主不相見伴伴不相見主伴伴主則互相見若不相見則各遍法界若互相見則同遍法界等所言齊唱者亦約互為主伴義邊同時遍法界故得十方齊唱也言果主果伴者問若果主果伴齊唱者僧祇隨好是佛說餘是菩薩說豈遮那并十方佛皆說耶答發心品說十方佛同名法慧證言我等諸佛亦如是說諸佛既說此佛豈獨不說耶故知但約所表如前已明言因主因伴等者准會解及指玄等以說者為主聽者為伴此中何不指海會為伴而獨指十方法慧菩薩耶故知此方說者為主時十方說者證之為伴十方說者為主時此方說者菩薩證之為伴故云主伴齊唱然海會等只得為聽衆不得望說者為伴故果主因伴之中亦唯言普賢等不言餘海會也又旨玄云對屬為文前句頓字唯約說者此句齊字亦為約說者頓之與齊周遍十方非漸次故前句所該中名頓今亦所極中名齊若後能先所則有不對之失今詳如此消釋似不得疏文之意上一極字已明遍於十方今又齊字目遍則有重繁之失故知前該與頓約橫竪異此極與齊約能所別智者詳之言果主因伴者問前果主果伴因主因伴十方互望可曰重重今但遮那為主普賢等為伴豈有重重極十方耶答此是一重普賢更與阿閦為伴二重如是望於十方亦有重重義也問若果主因伴齊唱者僧祇隨好果說因不說餘品因說果不說豈得齊唱答佛義如前菩薩亦說二品者以表細顯超故云佛說亦不礙於菩薩同說也問如說十地佛與金剛藏皆說豈不雜亂答普賢三昧品說十方諸佛同聲讚於普賢豈其同聲亦雜亂耶多既不雜二人齊唱豈成雜亂如諸菩薩同時應於萬類尚不雜亂況此雜亂耶鈔如法慧等者問如法慧說法十方佛證何不亦有因主果伴故此答也問其十方佛應闕伴義設爾下答也問四句圓融方為圓故今何闕此句耶答理實亦具今約不壞尊卑之相順軌儀故如下真妄交徹而但云即凡心而見佛心等鈔此界之東者即妙喜世界阿閦如來此云不動即知為主須一為伴須多也鈔有法界諸佛重數者上唯約十方諸佛則唯十重此以法界諸佛相望則有法界無盡重數思之鈔如十人下正喻果主果伴亦可兼喻下之因主因伴不喻果主因伴鈔佛主菩薩伴亦然者問因主因伴有互望義可云亦然其果主因伴無互望義云何例云亦然耶答諸說法菩薩不但望於本佛為伴者更與餘佛為伴乃有無盡重數故云亦然斯則言總意別鈔自有三義者結上三句以為三義也鈔二者遮那一佛下此約互遍論重重也然且約三句中果主因伴一句遍也鈔遮那處普光堂者說第二會處也然有三釋一殿是寶成光普照故二佛於其中放普光故三佛於殿中說普法門慧光照世故立斯名初義依主後二有財言東方等者經列十方東方如文殊南方妙色世界覺首菩薩西方蓮華色世界財首菩薩北方瞻葡華色寶首東北方優鉢羅華色功德首東南方金色目首西南方寶色精進首西北方金剛色法首下方玻璃色智首上方平等色賢首如是十方皆去十佛剎塵數界外而來普光堂也此即布定主伴遠近鈔若此主佛向東一界下此略示壓東一重之相也有法喻合此法說也如佛初坐普光堂文殊去十佛剎而來今佛向東遍一界已壓第一重伴剎應文殊過九佛剎塵數界外而來然以主伴皆遍故文殊還去十剎塵外也鈔如長空下此喻有二意一略喻上主伴諸剎遠近常定故云月如主佛列宿如伴二略喻主伴不分而遍故云一一水中遠近皆現謂且如此一溪中所現星月遠近如此若移此星月更近東一溪所現星月遠近亦然是知是中移者不動此界初一重主伴更移近東一界然此喻雖有不分而遍之義無相壓重重之理故云略也鈔義當下合也可知鈔如是主佛下顯餘重先明東之十重以佛初坐普光堂時文殊自十剎塵界外來今主佛遍東正當文殊住處金色依前近東還十剎塵界其西蓮華色應遠二十剎塵界外今亦不然唯十剎塵界外而來言如是主佛極於東方等者如去金色之東十剎塵界外則金色應在於西十剎塵界外言終不見文殊下遮妄解也妄解云主佛既極於東文殊應從西向佛今遮也意謂文殊亦從東十剎塵界外來近主佛又妄解云莫不文殊從西而來於佛前過東邊去方却從東向西來近主佛故今遮云亦不見文殊等然此兩節文有解前遮佛不過文殊向東後遮文殊不過佛向西然不及前解餘方妄解例此可遮鈔如是主佛極西方下明西之十重例上可知十方皆然鈔如人以十錢下且約大數理實先以十一錢布地向東餘方各十總有一百一也法喻方齊每一文錢心如此界主處錢邊緣如金色等伴處開通元寶等如相去十剎塵界也言第一錢當中者如第一重主伴遠近分量皆爾以第二壓第一錢上者此第二錢望下一錢開通元寶分量十分之中移近東一分故云近東一緣之地則開通元寶等亦近東一緣之地喻主佛近東一界餘伴剎亦各相去十剎塵界而各近東一界如此次十錢相壓皆爾有以開通元寶一字喻一佛剎塵界者重重之義稱隱又主佛至金色處時蓮華色界當娑婆處之義不成也今以圖示鈔如第一會重重下前猶各各自會論重重今則諸會重重者復相望論重重也若四十八會者下品經有十萬偈四十八品即以一品為一會也中本一千二百品應成一千二百箇重重言無盡品者即上本經之品也鈔如是諸佛重重相望者此佛為主重重望彼佛為主重重影此菩薩為伴重重望彼菩薩為伴重重亦互相遍具上三義故疏云主伴重重等問上說三句主伴今何唯就果主因伴論此重重餘何不爾答義准知故然上猶約顯而說若更細而論如於此處見佛坐一切塵中悉亦然故名主伴重重則固難思議矣鈔餘義至下即依處中十重明遍則此佛與彼佛同遍各遍前九重也鈔然疏本意下問說經處為意生身等豈不義成曲巧耶此答也言全不昭著者集玄云說處配意生身此舉所依處顯能依身又說經時舉所持時顯能持身又被海會舉所被衆顯能被身如此二三身既非直顯故云全不昭著也疏雖空空絶跡下四句雖字義含縱奪意該兩對此由前科道理雖玄義多涉迹恐不了者以本末相乖為難故今初句縱其空無朕迹下句奪其空不乖相下對上句縱其理本無言下句奪其不礙言然此兩對皆含法喻皆可意得言浩瀚者有本云浩爾以對上燦然故後人改為浩瀚取其讀便也鈔恐有難言等者難意以無相無言之本難有相有言之迹答意要由相故方顯無相要由言故方顯無言故也須知大意言大象無形大音無聲者此借老子德經文而立理也彼本云大音希聲今以下句云希微絶朕恐文涉重故改為無聲也言希微絶朕者義引老子道經視之不見章文也彼云聽之不聞曰希注云希聲之微也道非聲故聽之不聞搏之不得曰微注云搏執持也微妙也道無形故執持不得以況佛教至理甚深難可思議鈔則心絶動搖等者即大般若那伽室利分中文也梵語那伽此云龍室利此云吉祥以龍吉祥欲入城乞食妙吉祥曰隨汝意往然於行時勿得舉足勿得下足勿屈勿伸勿起於心勿興戲論勿生路想城邑聚落想大小男女想所以者何菩薩遠離諸所有想無高無下無卷無舒心絶動搖言忘戲論無有數量今唯用一對耳言何用下總結相違鈔故今釋下總答前難也不因教說至理無言何以知乎無言不因今容煥目何以知真身無相則因言入理藉像表真理必然矣鈔十忍品下引諸文證指配甚明不勞更釋鈔今疏下上即束義懸明此下方按文隨釋鈔法性本空空無諸相者直談真性絶相曰空言緣生之法無性故空者又推一切法既假緣成當知無性故空復有何相上自性空此緣生故空皆釋上空一字借空下釋下空一字鈔中論云者本頌即龍樹造青目菩薩釋云為破六十二見及無明等煩惱故說空若人於空復生見者是不可化譬如病須服藥可治若藥復為病則不可治如火從薪出以水可滅若從水生為用何滅鈔經云下即須彌偈讚品文無上慧菩薩偈也疏鈔釋云初句牒無二之迹以此前經云此中無有二故今牒云無中無有二次句遣之言無二者但言無有二非謂有無二即執成病若存無二之見則還成二以無二必對二故遣之又遣之以至於無遣故云三界一切空謂第一義空諸佛同見故云爾也此段准寂照唯證上空字即鈔中云即空空也者應剩一空字今詳應雙證二空字思之可見鈔次云下疏云正顯令住無住之覺身即非身故無可悟身見兩亡真法身也觀身實相觀佛亦然以悟自身故云則空亦無所住矣寂照唯證後空字今詳亦證二空上二句證初空下二句證後空鈔又上無中無有下問何以重釋此文答有二意若寂照等意前唯證初空一字今又證空空也若今解者前已證二空義今又成真空以勝前二空故云三界一切空即真空也真空即第一義故前二有所遣到此無所遣也即下絶迹之義也鈔言絶迹下若不得意千里遣之未免於跡如以楔出楔以賊逐賊無有已時故云有所得故如鳥履沙無所得故當句即絶鈔若礙於言身子被呵者淨名經中舍利弗問天女曰止此室其已久如答我止此室如耆年解脫舍利弗言止此久耶天女曰耆年解脫亦如何久舍利弗默然不答天女曰如何耆年大智而默答解脫者無所言說故吾於是不知所云此上即若礙於言也天曰言說文字皆解脫相所以者何解脫不內不外不在兩間文字亦不在內不在外不在兩間是故舍利弗無離文字說解脫也所以者何一切諸法皆解脫相則身子被呵也不礙於言文殊攸讚者文殊問淨名何等入不二法門淨名默然文殊讚言善哉善哉乃至無有文字言說是為真入不二法門如下第六鈔中具明意云若一向無言為是文殊亦應默然不應以言而讚也鈔況文字下不但如前無言不礙言況此言來無所從性不可得故即言時亦亡言也故雖性本無言而不礙性海之中言教波瀾浩瀚今言教海對上義天欲成文故或可言教深廣亦如海也言是以下收成上義言八音者即梵摩喻經所說八音如前已引言演大藏於龍宮者謂佛滅度後所說教法大分隱於龍宮至龍樹時方入搜求流布中外或云龍宮藏者從喻彰名龍宮多珍寶法藏具無邊義故鈔故知下結勸也言至趣非遠者無相秪在相中故非遠下句即相亡相故心無所得而得之則觸處甚深而莫測反顯未得意者雖近而莫覩言象易知而淺近恆寂故非近即言不礙無言也下句即言亡言云若亡情體之則目擊之事無不幽矣目擊之言語出莊子彼云孔子欲見溫伯雪子久矣及見絶無一言子路怪之孔子曰如斯人者目擊而道存何用容聲矣言絶下一句成上至趣非遠無相不礙相也繁興下一句成上言象非近言不礙無言也言故即言亡言也者成上一邊影取即相亡相言融常心言者謂上聖人言象既爾融通我等常途心所緣相及諸言說理皆如是故云無所遺矣疏若乃千門潛注下初二字則引文之詞初句垂末下句歸本並如鈔釋鈔以華嚴為根本法輪者此約部帙明本末不約五教而說不爾豈獨華嚴一經占盡圓教有以圓教為此中本前四為此中末者非正義也鈔開漸之本者所開即漸能開即佛所依開處即華嚴本教言如海等者指文所出即出現品意彼云譬如大海潛流四天下地有穿鑒者無不得水彼喻佛智普入一切衆生身心今借喻華嚴根本法輪潛注衆典故鈔九流下亦指文所出即肇公涅槃無名論文也九流者有二一瑤公注云即九類衆生也此依聖教說即九有也二云即儒家流道家流陰陽流法流名流墨流縱橫流雜流農流前義為正以三界九類衆生會歸於涅槃三乘聖人於此涅槃亦冥然而會故智論云魚歸於水鳥歸於林聖歸涅槃法歸分別鈔故論云下即攝論文彼明三身從法身流上句證開漸下句證歸本鈔故法華云下證開漸言一佛乘即華嚴者約所詮目能詮也會三下證歸本鈔第五經者即從地湧出品也由上首四大菩薩問佛云如來安樂少病少惱諸衆生等易可化度不令世尊生疲勞耶故佛答云始見我身等是衆生易度無疲勞之相也言法華攝餘經歸華嚴者天台宗中法華補注有破此文立其四難一歸彼不歸此難謂法華攝於餘經何不歸自而歸華嚴二當部無文難謂法華部內實無入華嚴之文三自語相違難謂是經之言既云法華何謂之歸華嚴耶四縱圓奪別難謂若華嚴便說一極者圓教可爾兼別如何彼以華嚴兼別說圓准會解皆為通之且通初難者若法華不歸華嚴而別歸自法華者應佛慧有二以前始見我身入佛慧是華嚴我今亦令得聞是經入佛慧是法華則有二佛慧也通第二難者即今此令入佛慧豈非當部之文耶又信解品中初見其父踞獅子床如說華嚴後認天性之父子如說法華然則此父豈非昔父耶此亦當經文爾通第三難者既因是經即是法華其終入於佛慧既與始入無殊豈非法華是經攝末歸華嚴之本耶明知自語前後相契通第四難者不善他宗也兼別之說唯汝自宗中義只由汝自宗中不合以華嚴兼於一別故失圓融具德宗旨今亦以此為難不亦悲夫問如上所通義皆可見然經但云入於佛慧如何乃云歸華嚴耶答此約所詮顯能詮也如上云一佛乘者即華嚴也者同此義爾以華嚴正詮法界法界即是一乘一乘即是佛慧今歸所詮佛慧即是歸能詮華嚴也是中攝末歸本四字若作釋者能攝是法華末謂餘經是末之攝能攝名攝攝末即能歸攝末歸之本名攝末歸本以華嚴為本依主持業可知又所攝即末所歸名歸攝末之歸攝末歸即本名攝末歸本亦以華嚴為本言餘如下說者即下教攝中及為教本中說也
