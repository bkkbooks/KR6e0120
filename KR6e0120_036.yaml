body:
  text: 蒼山再光寺比丘普瑞集疏統收所計不出四見等者亦即唯識意彼論云然諸外道品類雖多所執有法不過四種一執有法與有等性其體定一如數論等彼執非理所以者何勿一切法即有性故皆如有性體無差別又若色等即色等性色等應無青黃等異二執有法與有等性其體定異如勝論等彼執非理所以者何勿一切法非有性故如已滅無體不可得便違實等自體非無亦違世間現見有物又若色等非色等性應如聲等非眼等境三執有法與有等性亦一亦異如無慚等應等勒沙婆也此云苦行或是無慚梵語彼執非理所以者何一異同前一異過故二相違體應別故一異體同俱不成故勿一切法皆同一體或應一異是假非實而執為實理定不成四執有法與有等性非一非異如邪見等疏云若提子此是六師之數具云尼犍陀若提子據此即尼犍也故偏云邪見爾彼執非理所以者何非一異執同一異故非一異言為遮為表若唯是表應不雙非若但是遮應無所執亦遮亦表應互相違非遮非表應成戲論又非一異違世共知有一異物亦違己宗色等有法決定實有是故彼言唯矯避過諸有智者勿謬許之疏則因中有果者數論計自性諦中有二十三諦即因中有果也勝論計大有離實德業外別有一法即因中無果也鈔皆廣如百論者以彼論有破因中有果品破因中無果品此二品廣申立破故也其略去若因中先有果先無果二俱無生何以故若因中無果者何以但泥中有瓶縷中有布若其俱無泥應是布縷應是瓶若因中先有果者是因中是果生是事不然何以故是因即是果汝法因果不異故因中若先有果若先無果是皆不生復次若因中先有果者乳中有酪酥若果中先有因者酥中有酪乳等若乳中有酪酥等則一因多果若酥有酪乳等則一果中多因如是先後因果一時俱有過若因中無果亦如是過是故因中有果無果是皆無生又云若瓶與泥團不異者瓶生時泥團不應滅泥團亦不應為瓶因若泥團與瓶異者瓶不應生瓶亦不應為泥團果是故若因中有果若因中無果物不應生物以上無生破彼執也又云外曰若諸法空無相者世間人盡不信受內曰是因緣法世人信受所以者何因緣生法則是無相汝謂乳中有酪酥等童女已妊諸子食中已有糞又除梁椽等別有屋除縷別有布或言因中有果或言因中無果或言離因緣諸法生其實空不應言說世事是人所執誰當信受我法不爾與世人同故一切信受疏從虗空生即是無因者問前十一計所等之中自有無因何故此中指虗空為無因耶答前約所等自有無因此約能等十計相望虗空對餘衆情所見共云無體故指虗空為無因也鈔無而忽有下有二初略釋二因得如乳生酪下逆次廣明二因先釋邪因後一切諸法下釋無因配屬可見者指於疏文離佛法外總結釋也鈔有物混成先天地生者唐明皇注云將欲明道立名之由故云有物言有物混然而成含孕一切尋其生化乃在天地之先寂兮寥兮至為天下母者注云有物之體寂寥虗靜妙體湛然常寂故獨立而不移改應用遍於群有故周行而不危殆而萬物資以生成被其茂姜之德故可以為天下母言不知其名至遠曰返故者注云吾見有物生成隱無名氏故通生表其德字之曰道以包含目其體強名曰大妙用無方強名不得故自大而求之則逝而往矣自往而求之則遠不及矣若能了悟則返在於身心而證之鈔注云因其所大下即釋上道大天大地大王亦大之文也鈔域中者八極之內也言人謂王也等者廣鈔第七云由前所說人從天地生天地從道生故為人王者還法於本也言意在道法自然者謂鈔中由文相攝雖委細引之然疏本意唯在道法自然耳故上雖廣說以自然為極也鈔道動下釋道生一也於生物下增一名二釋上一生二也陽氣不能下釋二生三也積冲和下覆釋上義以歸經文言萬物負陰而抱陽下注云萬物得陰陽冲氣生成之故負抱陰陽含養冲氣以為柔和也鈔大宗師篇者彼第三篇也注云雖天地之大萬物之富其所宗而師者無心也言有情有信等者彼疏云明鑒洞照有情也赴機若響有信也恬淡寂寞無為也視之不見無形也鈔可傳而不可受者彼疏云寄言詮理可傳也體非數量不可受也方寸獨悟可得也離於形色不可見也鈔自古以固存下彼疏云自從也存有也虗通至道無始無終從本已來未有天地五氣未兆吾道存焉鈔神鬼神帝下彼疏云言大道能神於鬼靈神於天帝開明三景生立二儀至無之力有茲功用斯乃不神而神不生而生非神而神非生而生者也故老經云天得一以清神得一以靈也鈔在太極之先下彼疏云太極五氣也六極六合也且道在五氣之上不為高遠在六合之下不為深邃先天地生不為長久長於萬古不為耆艾言道非高非深非久非老故道無不在所在皆無也鈔狶韋氏下彼疏云狶韋氏文字已前遠古帝王號也得靈通之道故能驅馭羣品提挈二儀又作契字者契合也言能混同萬物符合二儀者也伏犧三皇也能伏牛乘馬伏犧牲故謂之伏犧也襲合也氣母者元氣之母應道也為得至道故能畫八卦演六爻調陰陽合六氣也維斗北斗也為衆星綱維故謂之維斗忒差也古始得於至道故歷於終始維持天地必無差忒日月光證於一道故得始終照臨竟無休息者也崑崙山名也在北海之北堪杯崑崙山神名也襲入也堪杯人面獸身得道入崑崙山為神姓馮名夷弘農華陰潼鄉提首里人也服八石神丹得水仙大川黃河也天帝錫馮夷為河伯故遊處孟津大山之中也肩吾神名司馬云山神不死至孔子時亦有得道故處東嶽為大川之神黃帝軒轅也採首山之銅鑄鼎於荊山之下鼎成有龍垂胡髯以迎帝帝遂將羣臣及後宮七十二人白日乘雲駕龍以登上天仙化而去鈔又云知天之所為等者彼疏云天者自然之謂至者造極之名天之所為者謂三景晦明四時生殺風雲舒卷雷雨寒溫也人之所為者謂手捉腳行目視耳聽心知巧拙凡心施為知天之所為悉皆自爾非關造作豈由智力是以內放其身外冥於物浩然大觀與衆玄同窮理盡性故稱為至也鈔即莊子文者具云夫鵠有本又作鶴同胡各切不日浴而白烏不日黔其金切黑也而黑自然各已是也彼疏云夫鵠白烏黑稟之自然豈須日日浴染方得如是以言物性其義例然言亦涅槃經者即第四十云納衣梵志說如刺生自然尖飛鳥自然色別毒蛇生已自然食土魚見鈎餌自然吞食龜陸生已自能入水犢子生已自能飲乳誰有教者佛言善男子是義不然若言入水非因緣者何不入火若言飲乳非因緣者何不唼角等鈔二引周易等者下等者二字剩也言繫者繫屬也下彼疏云謂繫詞者凡有二義論字取繫屬之義聖人繫屬此辭於爻卦之下故又音為系者取綱系之義卦之與爻各有其辭以釋其義則卦之與爻各有綱系所以音為系也夫子本作十翼申說上下二篇經文繫辭條貫義理別自為卷總曰繫辭言此上應加是故二字者以本文中有是故二字故彼文云是故易有太極等鈔注云者即韓康伯注也言孔云者即孔頴達疏也謂混元下問老子一生二前謂冲氣之一生第二陽氣何故今云太極生兩儀即老子一生二也答廣鈔第七云謂道動出冲元之氣道生一也於物之理未足又生陰陽二氣一生二陰氣下凝為地陽氣上騰為天和氣中為人倫二生三也三才成八卦萬物生焉三生萬物也文通二意引證家取意有異故不相違鈔彼注云質性也又釋太易指周易太極者即漢張湛注也今具書其注文庶見其始末列子云有太易太初太始太素注云此明物之自微至著變化之相因襲也太易者未有氣也易者無凝滯之稱凝寂於虗之域將何所見即如易繫之太極老氏之混成也太初者氣之始也陰陽未判即下說所謂渾淪也渾淪者言萬物相渾淪而未相離也太始者形之始也陰陽既判則品物流形也太素者質之始也質性也既為物矣則方圓剛柔靜躁浮沉各有其性故也鈔此則太初非太易等者會孔疏意謂張湛既指太易是太極則孔謂太初者非也以太初是第二名既同太易則非第二名也然鈔文少倒應云此則太易意云是太易也非太初便成太極在初文理方順智者詳之鈔若准易鈎命下會太極却在後也然易謂太極乃取有之所極處即是無也勾命決謂之太極取其形質圓具極處說也一是有初之極故上同太易一是有終之極故在四運之後故名同義異也而圭山原人論注云彼始有太易五重運轉乃至太極即勾命第五重太極生兩儀評曰清涼兩存故鈔云雖小異同皆是元氣生天地耳圭山直以易之太極同勾命決之太極似不順今文然勾命決以一氣有五運則一氣同耳於理無妨鈔謂震木離火等者四方四時也又巽同下四維也說卦云乾為天為圓為君為父為玉為金等故同兌金也巽為木為風為長女等故同震木也言八卦既立者從西北為首乾坎艮震巽離坤兌若約卦象乾三長坤六短離中虗坎中滿震仰盂艮覆碗兌上缺巽下短又乾為天坤為地離為火坎為水艮為山兌為澤震為雷巽為風此為八卦也爻象相推者一卦有八重八有六十四卦每一卦有六爻總計有三百八十四爻如此相推有吉凶故鈔一陽一陰之謂道陰陽不測謂之神此二句非連次之文故鈔重牒初句引注釋之也其陰陽不測謂之神者注云神也者變化之極妙萬物而為言不可以形詰者也故曰陰陽不測疏然無因邪因乃成大過等者圭山原人論云儒道二教說人畜等皆是虗無大道生成養育謂道法自然生於元氣元氣生天地天地生萬物故愚智貴賤貧富苦樂皆稟於天由於時命故死後却歸天地復其虗無者今略舉而詰之所言萬物皆從虗無大道而生者大道即是生死賢愚之本吉凶禍福之基基本既其常存則禍亂凶愚不可除也福慶賢善不可益也何用莊老之教耶又道育虎狼胎桀紂夭顏冉禍夷齊何名尊乎又言萬物皆是自然化生非因緣者則一切無因緣處悉應生化謂石應生草草或生人人生畜等又應生無前後起無早晚神仙不籍丹藥太平不籍賢良仁義不籍教習莊老周孔何用立教為軌則乎又言皆從元氣而生者則歘生之神未曾習慮豈得嬰孩便能愛惡驕恣焉若言歘有自然便能隨念愛惡等者則五德六藝悉能隨念而解何待因緣學習而成又若生是稟氣而歘有死是氣散而歘無則誰為鬼神乎且世有鑒達前生追憶往事則知生前相續非稟氣而歘有又驗鬼神靈知不斷則知死後非氣散而歘無故祭祀求禱典籍有文況死而蘇者說幽途事或死後感動妻子讐報怨恩今古皆有耶且天地之氣本無知也人稟無知之氣安得歘起而有知乎草木亦皆稟氣何不知乎又言貧富貴賤賢愚善惡吉凶禍福皆由天命者則天之賦命奚有貧多富少賤多貴少乃至禍多福少苟多少之分在天天何不平乎況有無行而貴守行而賤無德而富有德而貧逆吉義凶仁夭暴壽乃至有道者喪無道者興既皆由天天乃興不道而喪有道何有福善益謙之賞禍淫害盈之罰焉又既禍亂返逆皆由天命則聖人設教責人不責天罪物不罪命是不當也然則詩刺亂政書贊王道禮稱安上樂號移風豈是奉上天之意順造化之心乎故知專此教者未能原人鈔即唯大乘者問今以小乘因緣破彼彼應迷小乘因緣何故此中亦迷大乘因緣耶答若約彼迷何分大小若約破時但用小乘因緣是破於彼何用大耶言十地有文者經云三界所有唯是一心如來於此分別演說十二有支皆依一心而得成立鈔謂心法剎那等者謂第八識心為諸識本剎那剎那前滅後生各各自類相續故無始時界者界者因義即種子識展轉傳來前滅故不常後生故不斷此等心法依憑因緣對待而有非稟氣而成唯是識心為緣為對故豈同下顯異於彼也至耶字文勢稍長而義易知鈔即淨名經者上句全是經文下句義引言從癡有愛者癡即無明有愛謂三有之愛也此二為本生死無窮故言一無明發業等者此明大乘二世一重因果也謂無明乃至愛取有十支為現在因生老死二支為未來果言無明發業者謂能發雖通三毒無明為正故唯識云此中無明唯取能發正感後世善惡業者以為其體即分別全俱生一分言愛能潤業者能潤雖該三毒三有之愛偏增唯識云於潤業位愛力偏增說愛如水能沃潤故要數溉灌方生有芽言二過去下若大乘義三世一重因果若小乘義三世二重因果大乘義者唯識云此十二支十因二果定不同世彼疏云以異熟自非造業身即受果故約身死生為同世十因二果定不同世因中前七與愛取有或異或同若順生受業愛初生時其世必同第二生已去乃至後報業等世不同也今身造業後二世將受果時方起愛取故評曰若同世即前二世義若異世即今三世義若二三七各定同世生老死二愛取有三無明等七各定同世由癡發業熏發報種即識等五故前七支必定同世起愛取水潤先行識等六種轉名為有亦非異時非異時非起能潤隔世異時方成所潤生及老死同世可知若前七在過去愛取有三在現在生老死二在未來即十二支通三世有言小乘唯後義者說有三世現在愛取之義雖同却有二重因果謂過去無明行二支為因現在識等五支為果現在愛取有三支為因未來生死二支為果也言雖由三毒下釋疑可知涅槃下引證鈔小乘立三毒下由貪嗔癡發身口意造非福業感三塗總報惡業及人天別報苦業若造福業感欲界人天此上皆在欲界若造不動業中修四靜慮感色界報修四空定感四無色界報也鈔衆生癡所覆下復說無明為生死本已上三節一癡愛言發潤也二三毒言因之造業受果也三無明言為本勝也鈔然外道下釋疑疑云數論立薩埵等三德亦翻貪嗔癡和合能成諸法與佛教何殊答意云彼不知三毒是心王所有相應之心所能令造業等乃有諸法又計三德從冥諦而起用故是邪推求耳鈔若大乘說下唯心親種為因癡愛發潤為緣也若小乘以癡愛是根本故為因能招業等為緣言亦以者意顯或可業種為因癡愛為緣也大乘或以業種為緣名言種子為因言亦以者或通業種為因故鈔性空通初頓終教者若因緣生法無性故空即破相始教義若因緣所生諸法自性本空真理挺然露現即頓教義若因緣無別自體即真如隨緣而有今推無性即理故云性空即終教義言妙有即是實教者此不同前性通權通實故云即實教也若以性空融於妙有交徹具德即是圓教鈔三揀濫顯邪等者總揀此土西方外道言相濫同釋教蓋隨己邪思安立全乖正理謂易云下繫辭文也注云至神者寂然而無不應斯蓋功用之母此濫佛教真如不變隨緣也鈔禮云下注云言性不見物則無欲亦濫隨緣之義鈔老子云下即道經窈冥不測生成之用精妙甚存窈冥之精本無假雜物感必應亦濫真如之義也莊子下注云任之而自爾非僞也有濫一心之義鈔如今時成英尊師者奘三藏傳云道士蔡晃成英等競引釋論中百之意用通道經奘曰佛道兩教其致天殊安用佛言用通道義窮核言跡本出無從晃歸情曰自昔相傳祖憑佛教至於三論晃所師遵唯義幽通無不同會故引解也如僧肇著論咸引莊老狷白申明不相為怪佛言似道何爽論言奘曰佛教初開深文尚擁老談玄理微附佛言肇論所傳引為連類豈以喻詞而成通極今經繁富各有司南老子但五千言論無文解自餘千卷多是鑿方至如此土賢明何晏王弼周顒蕭懌顧顗之徒初數十家注解老子何不引用乃復旁通釋氏不乃推步逸蹤乎故知當時亦不許彼引用也鈔即涅槃經第三下先依彼疏科條後逐難解釋科文分二初問二初問佛差別爾時二難使無別二初舉邪正二常如佛後就其設難二初難佛常同世常若言後徵世常同佛佛常後答三初明邪異正二初喻七初過佛說經喻佛告二外道法喻長者三無師自攝喻賊得四學佛求常喻爾時五求常不得喻我等六妄加己情喻爾時七加情損失喻以水二合分二初正合前五喻五一合第二喻凡夫二合第三喻諸凡三合第五喻以是四合第六喻如彼五合第七喻寶亦後重顯加水之相是諸二辨正異邪三初法是故二喻六一如來出現喻如轉法輪二外道退散喻福德三正法無損喻牛無四付人修學喻時轉五修學得常喻是人六得常廣益喻以醍三合六一如來出現喻如轉法輪二外道退散喻諸凡三正法無損喻爾時四付人修學喻為衆五修學得常喻菩薩六得常廣益喻復合三結勸修學二初結以是後勸迦葉鈔性常者即數論師自性諦常也後徵中言世性者弘決云謂世間由冥諦而有即冥諦為世間本性也鈔譬如長者下長者喻過佛牛喻行法行門差別名色種種同顯一詮名共一羣委修行者隨緣修習名牧放人隨逐水草為得涅槃不期餘報名但為醍醐不求乳酪菩薩如牧牛者依法思量說之為搆得義充神名為自食鈔長者命終下過佛示滅名為命終諸外道等盜佛正法安置己典名為羣賊之所抄掠上楚孝切奪也下力約切取也劫也鈔賊得牛下彼無善巧解釋之師名為婦女出情圖度名自搆捋憶想作解以用充神名得已食鈔彼大長者下遠尋聖意我等下學佛求常夫醍醐下歎其所求鈔我等無器下外道自忖身無道機名無器依法修善名為得乳無有道機録彼善行名無妄處外道唯有世俗善機收録彼善故唯有皮囊不能觀察破相求實不知攢搖正觀名攢旁推名搖世善頗生名漿猶難得道果絶分名況生酥鈔以醍醐故下欲得常果於生死中妄相建立宣說自在天等以為常樂鈔以水多下由加妄情失於世善名為失乳失於賢聖所修道行名為失酪不得涅槃名失醍醐此等應得不得故名失也鈔凡夫亦爾下但合五喻略不合第一第四合第二喻中先正合何以下釋如彼下舉喻以帖鈔凡夫雖得戒定慧者即說三學文也合賊得牛無有方便不能解說者合無婦女鈔以是義下合漿猶難得況復生酥如彼下舉喻以帖鈔如彼羣賊下先牒舉前喻凡夫下舉法以合鈔實亦不得下合乳酪等一切俱失如彼下舉喻以帖鈔是諸凡夫下人天少善如所加乳妄說常等名為加水鈔如轉輪王者輪王喻佛出現世間名出現於世言以諸牛下喻佛以正法附諸菩薩言是人方便即得醍醐下喻菩薩巧修證會常法以己所得化他同證令出生死名無患苦鈔所謂如來常樂我淨者喻中云無患苦合中言得常樂言左右耳鈔抨驢乳等者抨字二切若披耕切訓彈也若補耕切訓使也從也二訓皆通若訓彈則彈捋之義若訓使即用謂故用驢乳不成酥酪又從驢出乳安成酥酪鈔依外教修行但招苦果者不能出生死故如西域記第二說人壽百歲時波你尼仙造千頌聲明論盛行於世後五百年有大羅漢見梵志為小童誦其聲明不及乃打之羅漢因而大哭梵志問其所以羅漢曰聞昔波你尼仙人否彼答曰曾聞今誦聲明即所造也羅漢曰今小童即彼仙人後身也但以強識玩習世典不究真理神智唐捐流轉未息是知習世俗之典展轉愚暗無所成益鈔然西方下已上正消疏文自下文外別敘以對外宗之異先舉西方外道之勝尚去佛道懸遠言真源小差者由不了自心何知正道從顛倒慧增長諸惡是故訶為邪說況此方下以全迷三世因果故又不及西方外道之多云何三教得同也鈔善止一身者謂行善只在現在一身雖禮記云父母亡歿君子有終身之憂小人有三年持孝而不慮父母他世之何如鈔齊死生一榮枯者莊子云古之真人不知悅生不知惡死又云其有旦夜之常天之道也窮達貧富命也言聚散氣為生死者莊子云人之生也氣之聚也散則為死言歸無物者道經云繩繩不可名復歸於無物注云繩繩者運動不息之意妙本湛然故云復歸於無物也此上之說彼皆為至極之道若方之釋教如以十歲之童望百歲之老不合言其同年也鈔棄智者亦即道經注云棄凡夫智詐之用淳朴淳朴則巧僞不作絶聰者莊子云黜聰明注云內不覺有一身外不覺有天地然後曠然與變化為體而無不通也言萬行會本者性本清淨由無明顛倒故生死長往能知真淨法身靈鑒真心即不妄認四大緣慮身心無邊煩惱秪為此身既不認此身即貪嗔自息貪嗔既息則不造業無業則無六道之報念念離過念念稱性修行而顯恆沙性德契會本性矣鈔以聚氣下繫辭云精氣為物遊魂為變注云精氣氤𣱦聚而成物聚極則散而遊魂為變也遊魂言其遊散也言死則歸天天地等者上天字誤書應是夫字禮記云魂氣歸乎天形魄歸乎地鈔縱言慎其所習也如云修身慎行子張學干祿子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔等此雖言身慎德秪在此身豈知習解脫之因而出生死等也鈔蠕飛者音軟又音喘皆蟲動之貌也即蟲類也飛即羽族也鈔四相遷流者生住異滅也言皆由緣力者由心生滅等緣萬法豈能常住又緣聚則生緣離則滅非由日月令遷也言力負自爾者即莊子云藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也彼疏云夜半暗冥以譬之理玄遠也有力者造化也夫藏舟於海壑正合其冥隱山於澤中謂之得所然而造化之力相負而趨夔故曰新驟如遊水凡惑之徒心靈愚昧而不知也鈔故謀未兆下德經云其安易持其未兆易謀言人正性安靜之時將欲執持令不散亂次雖欲起心尚未形兆謀度絶之使令不起並甚易爾其脆易破其微易散欲心初染尚自危脆能絶之者則易破禍患初起形兆尚微將欲防之則易散言故受而喜之者莊子云受而喜之不問所受者何物過之而無不適也忘而復之復之不由於識疏云上句喜所遇下句反未生也言絶於聖下即道經具云絶聖棄智注云絶聖人言教之跡則化無為言不住不染者若心不住著不染污道諦也逈超生死之外體性離斷離常滅諦也高出空有之巔又滅諦無在云不住性靜故不染逈超生死之外道諦離斷常之見高出空有之巔又道於諸境無住云無住滅本無其方所云無住道能除漏云不染滅性本寂云不染言因心下依心造業集也三界輪回苦也較言下明二宗逈異比較其言無一可得同也鈔染非染下老以等者道經云絶仁民復孝慈失道而有兼愛之仁絶兼愛之仁則復於大孝慈言欲害下道經云常有欲以見其徼常無欲以觀其妙言利纍於下道經云絶巧棄利盜賊無有注云人矜偏能巧必有爭利之心故絶巧則人不爭棄利則人自足則不為盜賊矣言禮出於亂下德經云夫禮者忠信之薄而亂之首注云制禮者為忠信衰薄而以禮為救亂之首爾又莊子云禮者道之華而亂之首言理由於道下德經云不出戶知天下不窺牖見天道注云垂拱無為不出教令於戶外是知理天下之道人事和則天象順故不煩窺牖而天道可知也其出彌遠其智彌少若不能無為假使出入彌遠其智理天下之道彌少不為而成不為言教而天下化成為者敗之凡情不能因任營為分外為者求遂理必敗之言得在於時下道經云將欲取天下而為之吾見其不得已天下者大寶之位也有道之者必待曆數在躬若暴亂之人將欲以力取而為之主者故或云吾見其不得矣言不在於爭也者有本云不在於事然爭字為正言欲為生死下圓覺云一切衆生從無始際由有種種恩愛貪欲故有輪回既能絶之故超生死言教方既別者方者法也二教所詮之法既別二教全異之理易知鈔歸非歸異者有本云歸異歸別有本云歸別歸異然皆約所歸辨異也言可搴可拔者搴音褰又音蹇皆訓取也言控御下已上皆始末信解自下並如理修行言逈登下尅證菩提妙智無所不達如登高臺而遠鑒故仁王經云如登高臺普觀一切無不明了涅槃具德聖靈遊集謂之園苑湛然下覆釋二依妙果存泯無礙嶷魚力切高也鈔生與死命也下莊子云死生存亡賢與不肖命也捍音旱抵也則能安處下莊子云是遁天倍情亡其所受天性所受各有本分不可逃亦不可加安時而處順哀樂所不入也夫哀樂生於得失也今玄通合變之士無時而不安無順而不處冥然與造化為一則無住而所我矣將何得何失孰為生哉故任其所受而哀樂無所措其間矣言孤劭者一音翹二音邵若翹音即精意之意若劭音即勉也即孤然得精意於寰中亦自勉於寰中也言淡然下莊子云淡然無極而衆美從之平易恬淡則憂患不能入邪氣不能襲泯然與正理俱住故無天災災生於逆天故無物纍纍生於逆物故泊音怕也言所歸既異下總結以所歸究竟既異能歸發迹亦殊其一人東行一人西往相去渺然何限千里鈔此上之十異即冀審思慎之深衷等者似勸勉於學者思之然有本云李思慎之深衷姓李名思慎故准弘決云自古先賢久判真僞近代名德仍因是非不如儒俗猶分清濁如李思慎十異等文故知姓李名思慎也不須異釋言衷者正也是此人甚深中正之理故言多以小乘等者鈔主斷詞顯少用大乘故有本云多用大乘者非也況乎下方是大乘故五教可知鈔無得下遮過習邪下明損圓覺疏云宿遇邪宗既熏其心積習成種故於聖道難起信心傳授之人下更偏誡說法之人於上邪正不善揀擇為人演說聞者信順如指引盲故圓覺經云若諸衆生雖求善友遇邪見者未得正悟是則名為外道種性邪師過謬非衆生咎也音釋狶音喜又弋枝切挈苦結切提挈也忒他得切差也更也杯布回切髯汝切頰須也窈深鳥切於遠也古縣切急也顒牛凶切仰也顗牛豈切靜也夒奴刀切猴也
